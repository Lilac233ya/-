var totalM=0,totalU=0;D.groups.forEach(function(g){totalM+=g.msgs;totalU+=g.users});
var activeTab="overview";
var selGroup=null;

function h(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// Global top senders
var globalTop=(function(){
  var all=[];
  D.groups.forEach(function(g){g.top.forEach(function(s){all.push({n:s.n,c:s.c,g:g.short,x:s.x,color:g.color})})});
  all.sort(function(a,b){return b.c-a.c});
  var seen={},r=[];
  all.forEach(function(s){if(!seen[s.n]){seen[s.n]=1;r.push(s)}});
  return r.slice(0,15);
})();

// Weighted mood
var wm={bear:0,wait:0,bull:0,fun:0};
D.groups.forEach(function(g){for(var k in wm)wm[k]+=g.mood[k]*g.msgs});
for(var k in wm)wm[k]=Math.round(wm[k]/totalM);

var MC={bear:"#F09595",wait:"#D3D1C7",bull:"#9FE1CB",fun:"#CECBF6"};
var ML={bear:"\u770B\u7A7A",wait:"\u89C2\u671B",bull:"\u770B\u591A",fun:"\u5A31\u4E50"};

function renderTabs(){
  var el=document.getElementById("tabBar");
  el.innerHTML=D.tabs.map(function(t){return '<button class="tab-btn'+(activeTab===t.id?' active':'')+'" data-tab="'+t.id+'">'+t.icon+' '+t.label+'</button>'}).join("");
  el.querySelectorAll(".tab-btn").forEach(function(b){b.onclick=function(){activeTab=b.dataset.tab;renderTabs();renderAll()}});
}

function renderAll(){
  document.querySelectorAll(".tab-content").forEach(function(e){e.classList.remove("active")});
  var el=document.getElementById("tab-"+activeTab);
  if(el){el.classList.add("active");el.style.animation="none";el.offsetHeight;el.style.animation="fadeSlide .3s ease"}
  switch(activeTab){
    case"overview":renderOverview();break;
    case"topics":renderTopics();break;
    case"groups":renderGroups();break;
    case"users":renderUsers();break;
    case"insights":renderInsights();break;
  }
}

function moodBarHTML(m,ht){
  var s='<div class="mood-bar" style="height:'+(ht||32)+'px">';
  for(var k in m)s+='<div class="mood-seg" style="width:'+m[k]+'%;background:'+MC[k]+';color:#333">'+(m[k]>=15?ML[k]+' '+m[k]+'%':'')+'</div>';
  s+='</div><div class="mood-legend">';
  for(var k in m)s+='<span><span class="mood-dot" style="background:'+MC[k]+'"></span>'+ML[k]+' '+m[k]+'%</span>';
  return s+'</div>';
}

  s+='<div class="cross-grid">';
  D.cross.forEach(function(u){
    s+='<div class="cross-card"><div class="cross-name">'+h(u.n)+'</div><div class="cross-tags">'+u.gs.map(function(g){return'<span class="cross-tag" style="background:#e8f0fe;color:#2980b9">'+h(g.g)+(g.c>0?' '+g.c+'\u6761':'')+'</span>'}).join("")+'</div><div class="cross-role">'+h(u.role)+'</div></div>';
  });
  s+='</div>';

  s+='<div class="sec-title" style="margin-top:22px">\u{1F3C6} \u5168\u7FA4 TOP 15 \u53D1\u8A00\u4EBA\u6392\u884C</div>';
  s+='<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>#</th><th>\u53D1\u8A00\u4EBA</th><th>\u6240\u5728\u7FA4\u804A</th><th style="text-align:right">\u53D1\u8A00\u6570</th><th style="text-align:right">\u5360\u7FA4\u6BD4</th></tr></thead><tbody>';
  globalTop.forEach(function(u,i){
    var grp=D.groups.find(function(g){return g.short===u.g});
    var pct=grp?(u.c/grp.msgs*100).toFixed(1):"-";
    s+='<tr><td>'+(i+1)+'</td><td style="font-weight:'+(i<3?700:400)+'">'+h(u.n)+'</td><td><span class="s-badge" style="background:'+u.color+'18;color:'+u.color+'">'+h(u.g)+'</span>';
    if(u.x)u.x.forEach(function(c){s+=' <span class="s-badge" style="background:#f3f4f6;color:#999">'+h(c)+'</span>'});
    s+='</td><td style="text-align:right;font-weight:700">'+u.c+'</td><td style="text-align:right;color:#999">'+pct+'%</td></tr>';
  });
  s+='</tbody></table></div>';
  el.innerHTML=s;
}

function renderInsights(){
  var el=document.getElementById("tab-insights");
  var s='<div class="sec-title">\u{1F4A1} \u8FD0\u8425\u6D1E\u5BDF\u4E0E\u5EFA\u8BAE</div>';
  D.insights.forEach(function(ins,i){
    s+='<div class="insight" style="background:'+ins.bg+';border-color:'+ins.c+'"><div class="insight-title" style="color:'+ins.c+'">'+(i+1)+'. '+h(ins.t)+'</div><div class="insight-desc">'+h(ins.d)+'</div></div>';
  });
  el.innerHTML=s;
}

renderTabs();
renderAll();
</script>
</body>
</html>
