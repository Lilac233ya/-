    {cat:"全球事件",p:"HIGH",t:"特朗普发表伊朗问题全国讲话：军事行动\"达到或超过基准\"，2-3周结束时间表再确认",d:"美国总统特朗普4月2日就伊朗军事冲突发表全国电视讲话，白宫官员称军事行动\"达到或超过既定基准\"，并重申2-3周内完成相关作战任务的时间表。这是特朗普就伊朗冲突发表的首次正式全国讲话。市场对讲话内容初步解读为\"收尾信号\"，股指期货短暂走高、油价有所回落，但白宫同步向盟友施压要求增加贡献，实际停火进程仍存变数。"},
    {cat:"全球事件",p:"HIGH",t:"美国情报机构：伊朗目前无意实质性谈判，认为特朗普缺乏诚意",d:"美国情报机构评估显示，伊朗当前无意进行实质性停战谈判，内部认定特朗普政府不具备足够谈判诚意。该评估与特朗普讲话中传递的\"收尾\"信号形成鲜明矛盾，说明美伊双方存在严重认知鸿沟。Polymarket停火概率维持低位（38%），战略对话实质推进仍面临重大障碍，市场需防范地缘风险反弹。"},
    {cat:"传统金融",p:"HIGH",t:"黄金突破$4,800创历史新高，有望五连阳 · 停火预期与通胀双轮驱动",d:"黄金盘中突破$4,800，日涨幅达2.0%，连续五日上涨势头强劲。停战预期带来避险需求结构性松动，但油价高位（WTI $100+）维系通胀担忧，黄金在\"停火乐观+通胀持续\"的矛盾叙事下持续受益。黄金与加密资产的相关性再度弱化，当前BTC在$67,800附近震荡而黄金持续创新高，说明机构增量资金优先流向传统避险资产。"},
    {cat:"传统金融",p:"MID",t:"WTI原油逼近$100大关，日涨0.93% · 特朗普讲话前市场情绪紧绷",d:"WTI原油在特朗普伊朗讲话前夜涨至$100.20/桶，布伦特原油越过$99。原油在$100关口附近形成强阻力，若霍尔木兹局势转向宽松将大幅回落。本周四美国EIA原油库存报告（预计周三公布）将成为原油短期方向的关键数据参考。"},
    {cat:"传统金融",p:"MID",t:"日韩股市开盘走高：KOSPI +1.56%，日经225 +0.50% · 亚洲情绪修复",d:"受特朗普伊朗讲话\"收尾\"信号推动，日韩股市4月2日开盘双双走高，KOSPI涨1.56%，日经225涨0.50%，扭转此前连续多日的跌势。亚洲市场风险偏好短暂回升，但Drift黑客事件对Solana生态的冲击或使加密资产承压，情绪修复的可持续性仍待确认。"},
    {cat:"全球监管",p:"HIGH",t:"美国财政部正式发布GENIUS法案首个稳定币实施规则，$100亿以下可选州级监管",d:"美国财政部正式发布《GENIUS法案》首个稳定币拟议规则制定通知（NPRM），标志着该法案从立法语言进入操作层面落地。核心要点：流通量$100亿美元以下的小型发行人，若所在州监管框架达到联邦\"实质等同\"标准，可选择接受州级而非联邦监管。公众意见征询期60天，FDIC、OCC正同步制定配套规则。这为Circle、Paxos等中小发行人提供了更灵活的合规路径，港元稳定币等境外方案的联邦监管坐标也将逐渐清晰。"},
    {cat:"全球监管",p:"MID",t:"加密政治行动委员会任命Tether高管Jesse Spiro为主席，稳定币政治博弈升温",d:"Fellowship PAC（加密行业主要政治献金机构）任命Tether全球事务主管Jesse Spiro担任主席。此举发生在GENIUS法案规则落地的同一天，凸显Tether积极介入美国监管政策制定的战略意图。此前Tether面临与GENIUS法案储备要求的合规摩擦，此次人事布局或意在加强USDT在美国监管框架内的话语权。"},
    {cat:"行业趋势",p:"HIGH",t:"Schwab/Citadel/Fidelity支持的EDX Markets申请美国国家信托银行牌照",d:"EDX Markets——由嘉信理财、城堡证券和富达投资共同支持的机构级加密交易所——正式向美国货币监理署（OCC）申请国家信托银行牌照，以开展数字资产托管和清算服务。这是继Kraken获得美联储主账户后，又一家传统金融巨头背书的加密机构向银行体系内嵌发力，传统金融全面拥抱数字资产的趋势进一步加速。"},
    {cat:"行业趋势",p:"MID",t:"Bithumb宣布IPO推迟至2028年，受内部治理与监管合规双重拖累",d:"韩国第二大加密交易所Bithumb宣布原计划于2025-2026年落地的IPO延期至2028年，官方原因为内部控制体系完善需求及监管合规要求。Bithumb此前曾多次提上市计划均受挫，本次明确延至2028年也侧面反映韩国监管机构对大型交易所上市的严苛态度。"},
    {cat:"链上事件",p:"HIGH",t:"【年度最大链上攻击】Drift Protocol被盗$2.2-2.7亿，DRIFT暴跌35%",d:"Solana头部DeFi协议Drift Protocol于4月2日凌晨遭遇重大安全事件。链上数据：被盗资产包含USDC约$6040万、JLP代币$1.556亿、cbBTC $1130万及其他资产，黑客将部分资金桥接至以太坊，购入约19,913枚ETH（约$4260万），并向Hyperliquid和Binance转入被盗SOL。Drift官方确认\"这不是愚人节玩笑\"，已建议所有用户暂停充值并正在全力调查。DRIFT代币在消息后暴跌35%，SOL受Solana生态信心冲击跌3%，为2026年迄今最大单次链上黑客事件。"},
    {cat:"链上事件",p:"MID",t:"Jupiter澄清未受Drift事件波及，JLP由基础资产完全背书",d:"Solana头部流动性协议Jupiter在Drift事件发酵后第一时间发表声明，明确表示Jupiter协议未受Drift黑客事件影响，其流动性池代币JLP由BTC、ETH、SOL及稳定币等基础资产完全背书支撑。及时的澄清声明有效防止了Solana生态流动性的连锁恐慌，但在Drift TVL腰斩背景下，Solana DeFi整体信心修复仍需时间。"},
    {cat:"链上事件",p:"MID",t:"Trust Wallet Discord短链接遭劫持，指向钓鱼服务器 · 用户高度警惕",d:"Trust Wallet官方Discord频道的短链接遭恶意方劫持，目前重定向至钓鱼网站服务器。Trust Wallet已发出紧急警告，提醒用户切勿点击任何来自Discord的链接，直至问题修复。在Drift黑客事件同一天出现此类社会工程攻击，提示黑客可能借助市场恐慌窗口集中发动多点位攻击，用户需提高警惕。"},
    {cat:"加密数据",p:"MID",t:"BTC短时跌破$68,000，24H涨幅收窄至0.03% · 分布阶段特征显现",d:"BTC在4月1日夜间短时跌破$68,000 USDT，24小时涨幅由前一日的1.3%收窄至接近0。Bloomberg报道大型持有者抛售潮持续，买盘力量尚不足以对冲，市场进入\"分发阶段\"特征。链上数据显示STH-MVRV仍低于1.0，短期持有者整体亏损，且本周五即将公布的非农就业数据可能带来方向性波动。"},
    {cat:"加密数据",p:"MID",t:"Drift黑客购入约19,913枚ETH（约$4260万），ETH价格短暂受提振",d:"链上追踪显示，Drift黑客在将资产桥接至以太坊后，大规模购入约19,913枚ETH，市值约$4260万。受此大单买入推动，ETH价格短暂走强至$2,140附近，但资金来源为被盗资产，预计在链上追踪施压后黑客可能进行混币处理或转移，ETH的\"黑客买盘\"支撑属于非正常流量，持续性存疑。"}

  "2026-04-03": [
    {cat:"全球事件",p:"HIGH",t:"美以扩大打击，卡拉季大桥遭轰炸，布伦特$141.37创2008年新高 · WTI日内暴涨逾15%",d:"美以联军4月3日凌晨对伊朗发动新一轮扩大打击，摧毁伊朗标志性工程卡拉季大桥（中东最高桥梁）。霍尔木兹海峡封锁已持续超一个月，构成\"历史上最大规模原油供应中断\"——该航道承载全球约20%的石油运输。布伦特现货随之飙升至$141.37，WTI日内涨幅逾15%突破$110，两价格均创自2008年以来最高。加密市场与风险资产同步大幅承压。"},
    {cat:"全球事件",p:"HIGH",t:"伊朗与阿曼起草霍尔木兹通行协议，油价短暂下挫，美股三大指数全面翻涨",d:"伊朗副外长Gharibabadi援引IRNA称，伊朗正与阿曼协商起草霍尔木兹海峡船只通行协议。消息释出后，WTI短暂跌破$107、布伦特回落至$103.50，黄金重回$4,700上方，纳指翻转此前2%的跌幅，美股三大指数全面转涨。但随后美以扩大打击消息传出，油价又大幅反弹。外交信号与军事行动的交替出现，正导致能源市场出现极端双向波动。"},
    {cat:"货币政策",p:"HIGH",t:"纽约联储Williams：油价冲击将波及整体经济，机票等全线商品价格上涨",d:"纽约联储主席Williams警告，伊朗战争引发的油价飙升将以\"机票成本上升\"为代表，系统性传导至多类商品与服务。自冲突2月28日爆发以来，美国汽油均价已涨逾$1/加仑，当前全国均价超$4/加仑。Williams坦言现行货币政策\"处于良好位置\"，但意外的地缘冲击大幅限制利率工具的有效性，完整的货币政策效果需至少一年才能完全显现。"},
    {cat:"货币政策",p:"HIGH",t:"芝加哥联储Goolsbee：油价冲击来的不巧，正显著推高12个月通胀预期",d:"芝加哥联储主席Goolsbee表示，\"油价短期内急速飙升时，人们对未来12个月的通胀预期会开始显著上升\"。当前的油价冲击叠加此前关税驱动的通胀尚未消退，形成双重叠加的价格压力，企业面临成本不确定性加剧、招聘动能减弱的双重困境。Goolsbee的发言进一步巩固市场对美联储年内降息次数下修的预期，10年期美债收益率保持高位。"},
    {cat:"全球监管",p:"HIGH",t:"Todd Blanche出任美国代理司法部长，曾持有$15.9-48.5万加密资产，此前解散DOJ加密执法团队",d:"特朗普解除Bondi的司法部长职务，任命副部长Todd Blanche为代理司法部长。Blanche此前签署备忘录停止DOJ加密相关起诉、解散专项执法团队，被市场视为强力\"去监管\"信号。然而公开披露显示，Blanche在签署上述命令时本人持有$15.9-48.5万的加密资产（含BTC、SOL、ADA、ETH），可能违反利益回避准则。这一人事变动将进一步推动DOJ对加密行业的宽松立场，但其合规争议也为后续监管稳定性埋下变数。"},
    {cat:"传统金融",p:"MID",t:"SpaceX IPO目标估值超$2万亿，计划融资$750亿，将超越沙特阿美创IPO史上最大规模",d:"SpaceX已秘密向SEC提交IPO申请，目标估值超$2万亿（较2月收购xAI后的$1.25万亿大幅提升），计划融资规模高达$750亿，将远超沙特阿美2019年$290亿的IPO记录。美国银行、花旗、高盛、摩根大通、摩根士丹利担任联席主承销商，最早可能于6月上市。融资资金将用于太空AI数据中心和月球制造项目。体量级别的超大规模IPO对全球流动性有一定分流效应，值得加密市场关注。"},
    {cat:"行业趋势",p:"MID",t:"Polymarket新增GENIUS法案首日FDV预测，$1亿以上概率74%",d:"Polymarket上线新预测事件：\"GENIUS法案稳定币首日上市后FDV超过1亿美元\"的概率被定价为74%。这一预测市场的设立反映机构与散户对GENIUS法案落地后稳定币赛道的高度乐观预期，同时也显示市场已将该法案的通过视为大概率事件，正在前置定价其正式落地的影响。"},
    {cat:"行业趋势",p:"MID",t:"Lighter创始人：已启动链上衍生品交易牌照申请，认为合规是吸引机构的前提",d:"链上衍生品协议Lighter CEO Vladimir Novakovski表示已正式启动交易牌照申请流程，认为\"合规许可是吸引Citadel等主流传统金融机构的必要条件\"。这与EDX Markets昨日申请信托银行牌照的趋势高度一致，反映出加密原生协议正在主动向监管体系靠拢，以换取机构客户访问权限，DeFi合规化浪潮持续升温。"},
    {cat:"加密数据",p:"HIGH",t:"加密市场全面承压：BTC $66,800，ETH -4%至$2,055，总市值跌至$2.39万亿，加密概念股普跌",d:"地缘与宏观双重压力下，加密市场陷入低位震荡：BTC 24H跌1.8%至$66,800，ETH -4%至$2,055，SOL维持$79，总市值缩水至$2.39万亿。美股加密概念股普跌：MicroStrategy跌2.4%，Coinbase、Circle等跟跌。山寨币呈两极分化——CTSI涨67%、SOLV涨47%领涨，STO跌49%、BANK跌46%领跌，高低市值间的资金轮动特征明显。今日美国非农就业数据将是近期最重要的宏观催化剂，高油价下非农若超预期将进一步压缩降息空间，对加密市场形成双重打压。"}

  "2026-04-04": [
    {cat:"全球事件",p:"HIGH",t:"美军F-15在伊朗上空被击落，特种部队救回一名飞行员，另一名仍失踪",d:"美国特种部队已成功救回在伊朗上空被击落的F-15战斗机的一名机组人员，另一名机组人员仍处于失联状态，伊朗方面同步展开搜寻行动。这是美伊冲突自2月28日爆发以来首次出现美军飞行员伤亡/失踪事件，标志着冲突进入新的危险阶段。此类事件历史上往往会显著推高市场的地缘风险溢价，黄金、原油等避险资产短期需求或再度上升。"},
    {cat:"全球事件",p:"HIGH",t:"美国情报：伊朗短期内不太可能开放霍尔木兹，油价下行空间有限",d:"美国最新情报评估显示，伊朗在可预见的短期内不太可能主动解除霍尔木兹海峡封锁。这一判断与前一日伊朗与阿曼就通行协议进行磋商的外交信号形成矛盾，凸显美伊谈判的\"外交烟雾弹\"属性。霍尔木兹持续封锁意味着布伦特原油将维持高位，当前$108+的WTI价格中仍含有大量地缘风险溢价。"},
    {cat:"全球事件",p:"MID",t:"美国将霍尔木兹航运再保险翻倍至$400亿，Berkshire/AIG/Travelers等六大险企加入",d:"美国国际发展金融公司（DFC）宣布将霍尔木兹海峡航运再保险承诺规模从$200亿翻倍至$400亿，新增Travelers、Liberty Mutual、Berkshire Hathaway、AIG、Starr、CNA等六大保险商。此举旨在通过提升承保能力恢复全球航运业对霍尔木兹通行的信心，但实际效果仍取决于封锁解除与否。这一举措也侧面印证了美国政府对封锁将持续一段时间的内部预判。"},
    {cat:"宏观数据",p:"HIGH",t:"美国3月非农就业17.8万（预期6万），失业率4.3% · CME美联储4月维持概率99.5%",d:"美国劳工部3月非农就业人口17.8万，较预期6万超出近三倍；失业率4.3%，优于预期4.4%。数据公布后，CME FedWatch显示美联储4月维持利率不变概率直接拉升至99.5%，Polymarket同步定价98%维持。在高油价叠加关税余压的宏观背景下，就业市场的强劲韧性进一步压缩降息空间，年内首次降息时点预期大幅后移，加密资产面临持续的\"无降息环境\"逆风。"},
    {cat:"宏观数据",p:"MID",t:"美联储戴利：应以就业率而非就业人数衡量市场，零增长不代表经济疲软",d:"旧金山联储主席戴利在非农数据发布后表态，认为\"就业率与失业率比单纯的新增就业人数更能准确反映劳动力市场健康状况\"，并指出劳动力供给增长放缓背景下，就业零增长甚至负增长不一定意味着经济疲软。戴利的发言为市场提供了一个边际上更为温和的解读框架，但非农大幅超预期已实质性压缩美联储本轮的政策灵活性。"},
    {cat:"宏观数据",p:"MID",t:"牛津经济研究院：美联储今年仍可能两次降息，以防止就业市场因能源冲击而崩溃",d:"牛津经济研究院发布预测，认为即便非农短期强劲，若伊朗冲突导致的油价冲击延续对制造业和服务业造成持续打压，美联储今年仍存在两次降息的可能性，以防止就业市场在能源成本重压下出现系统性崩溃。该预测与CME市场当前定价存在明显偏差，但为市场提供了\"油价主导降息逻辑\"的鹰鸽分歧参考。"},
    {cat:"传统金融",p:"HIGH",t:"嘉信理财推出\"Schwab Crypto\"账户，全美48州支持直接交易BTC与ETH",d:"美国最大折扣经纪商Charles Schwab正式推出\"Schwab Crypto\"加密交易账户，支持在全美（除纽约州和路易斯安那州外）直接买卖比特币和以太坊，由Charles Schwab Premier Bank, SSB负责内部托管。这是继Robinhood、Fidelity、EDX之后又一头部传统券商正式开放加密交易，对推动加密资产的大众普及意义重大——嘉信理财管理资产规模超$9万亿，其客户基础将为BTC/ETH带来可观的潜在增量需求。"},
    {cat:"传统金融",p:"MID",t:"美股加密板块收盘分化：TRON大涨11.37%，MARA +8.33%，MSTR跌2.4%",d:"昨日美股加密概念股涨跌明显分化：TRON相关概念股涨逾11.37%领涨，比特币矿企MARA涨8.33%跟涨，而MicroStrategy（MSTR）下跌2.4%，游戏相关股SBET跌4.18%。三大股指小幅收盘：道指-0.13%，标普500 +0.11%，纳指+0.18%，大盘整体震荡。加密板块资金向特定强势叙事（TRON生态）聚集，反映在高波动期机构资金的精选逻辑正在主导板块分化。"},
    {cat:"加密数据",p:"HIGH",t:"摩根大通：Q1 2026加密资金流仅$110亿，同比仅去年三分之一，ETF机构流入持续疲软",d:"摩根大通研究报告显示，2026年Q1加密数字资产资金流入总额约$110亿，仅为2025年同期水平的三分之一，年化若维持当前节奏全年仅$440亿，大幅低于2025年的$1,300亿。核心流入来源已收窄至企业资产负债表配置（MicroStrategy等）和加密风险投资，散户与机构ETF资金流双双疲软。CME比特币期货持仓量下降印证机构情绪转向。报告揭示当前市场已进入\"少数大户主导\"的资金结构，广泛性资金回流信号尚未出现。"},
    {cat:"行业趋势",p:"MID",t:"企业BTC财库策略分化：Nakamoto亏损减284枚换取$2000万流动性，Strategy 76.2万枚按兵不动",d:"企业比特币财库的持仓策略出现明显分化：Nakamoto Holdings宣布以亏损价格卖出284枚BTC，套现约$2000万用于营运资金及并购投资，并同步削减了对日本Metaplanet的持股；而Strategy维持其约762,000枚BTC的巨额持仓不变，坚持\"只买不卖\"战略。Nakamoto的亏损减仓折射出部分企业财库在高油价+高利率叠加下的流动性压力，与Strategy基本面截然不同，凸显企业BTC持仓策略已步入分化期。"},

    {cat:"链上事件",p:"HIGH",t:"HypurrFi疑似遭域名劫持，协议TVL约$3000万，紧急警告用户停止访问",d:"HyperEVM上的DeFi借贷协议HypurrFi官方发出紧急警告：其网站域名hypurr.fi疑似已遭恶意方劫持，前端界面可能注入恶意代码。协议方明确表示\"勿使用hypurr.fi域名\"，强调底层智能合约资产暂未受到直接威胁，但访问被劫持的前端可能导致用户钱包被盗。当前TVL约$3000万，需等待团队进一步修复公告后再使用。这是继Trust Wallet Discord劫持和Drift协议攻击后本周第三起针对加密前端/基础设施的安全事件。"},

    {cat:"链上事件",p:"MID",t:"FTX/Alameda通过Wintermute清算694万枚DRIFT（$32万），初始价值$622万，缩水94%",d:"FTX/Alameda清算团队在Drift Protocol被盗事件发生约6小时后，通过Wintermute出售694万枚DRIFT，套现约$32万。Alameda此前通过归属获得约833万枚DRIFT，初始价值约$622万，如今套现仅$32万，资产缩水高达94%。此举是FTX清算团队面对协议安全危机选择的止损操作，进一步压制了DRIFT的市场情绪。"}

    {cat:"行业趋势",p:"MID",t:"SpaceX IPO要求摩根斯坦利等大行订阅Grok，马斯克AI生态与TradFi深度捆绑",d:"Elon Musk要求参与SpaceX首次公开募股的金融机构必须订阅Grok AI服务，摩根斯坦利、高盛、摩根大通、美国银行、花旗等主要承销商已同意每年投入数千万美元。这是马斯克将AI商业化与TradFi入场资格捆绑的首个公开案例，对加密行业的启示在于：顶级TradFi机构正以前所未有的方式与科技/加密生态融合。"},
    {cat:"行业趋势",p:"MID",t:"CZ新书《Freedom of Money》发布，全部销售收益将捐赠慈善，不个人保留",d:"币安创始人赵长鹏（CZ）分享新书《Freedom of Money》（中文名《币安人生》）首批章节，书中记述其从创立币安到经历法律风波的完整历程。CZ表明全部销售所得将捐赠慈善，本人不留任何收益。此举被外界解读为CZ重建公众形象并持续活跃于加密行业的积极信号，当前Binance在其后继领导层治下运营稳健。"},
    {cat:"链上事件",p:"MID",t:"新巨鲸在Hyperliquid开20倍杠杆ETH空单$2025万，当前浮亏$25.5万",d:"一新创建钱包向Hyperliquid存入398万USDC，以20倍杠杆开设9,526枚ETH空单（约$2,025万）。该操作方向与市场趋势相反——ETH正在反弹——当前已出现约$25.5万浮亏。大户重仓做空可能反映对地缘不确定性持续或反弹不可持续的判断，也可能是对冲操作，后续需关注平仓动向。"},
    {cat:"链上事件",p:"MID",t:"loracle.hl出售45万枚HYPE代币套现$1501万，其中$1272万存入币安",d:"链上数据显示，loracle.hl出售450,000枚HYPE代币，获得约$15,012,000 USDC，随即将其中$12,725,000转入币安。loracle.hl为Hyperliquid早期深度参与者，此次大额套现值得关注——或为获利了结、流动性管理或机构级别再平衡操作，可能对HYPE价格形成短期抛压。"}

  "2026-04-07": [
    {cat:"全球事件",p:"HIGH",t:"伊朗通过巴基斯坦向美方传达10项反条件，含霍尔木兹协议、制裁解除及赔偿要求",d:"伊朗伊斯兰共和国通讯社(IRNA)确认，伊朗已通过巴基斯坦渠道向美国传达包含10项条款的反提案，内容涵盖霍尔木兹海峡协议安排、全面制裁解除及战争赔偿。此前美方Witkoff提出15点框架，伊朗先斥责后反提，双方以战促谈态势明显，谈判进入实质博弈阶段。45天停火谈判窗口仍在进行中。"},
    {cat:"全球事件",p:"HIGH",t:"沙特阿拉伯朱拜勒工业区遭大范围打击，全球最大石化基地之一告警",d:"伊朗援引消息源称，沙特东北部朱拜勒工业区发生爆炸，系遭到大范围打击。该区年产约6000万吨石化产品，占全球产量6%-8%，聚集沙特基础工业公司、美国陶氏化学萨达拉项目及沙特阿美/道达尔合资项目。冲突首次直接扩散至沙特核心工业设施，能源市场风险溢价进一步拉升。"},
    {cat:"全球事件",p:"HIGH",t:"五角大楼取消原定周二上午8点新闻发布会，未说明原因",d:"美国五角大楼宣布取消当地时间周二（4月7日）上午8点的例行新闻发布会，未给出任何说明理由。这一罕见举动恰逢特朗普此前宣布的伊朗最终期限（4月7日），市场普遍将其解读为军事行动可能正在进行中的信号，加剧地缘风险溢价。"},
    {cat:"全球事件",p:"HIGH",t:"特朗普白宫发布会：伊朗10条回应\"意义重大但不够好\"，称可4小时内摧毁伊朗桥梁电厂",d:"特朗普在白宫新闻发布会上表示，伊朗的10项反条件\"不够好\"但属于\"重要的一步\"。他强调协议必须包含石油和物资的自由通行，并提议\"由美国在霍尔木兹海峡收取过路费\"。同时威胁称美军可在4小时内摧毁伊朗全部桥梁和发电厂，并表示若由自己决定，会\"拿走石油赚大钱\"。副总统万斯参与谈判。"},
    {cat:"全球事件",p:"MID",t:"亚太股市开盘普涨：ASX 200 +2%、KOSPI +2%、日本东证 +1%，三星 +4.6%",d:"4月7日亚太主要股指集体上扬，受地缘谈判信号与AI行业财报双重驱动。三星电子一季度利润暴增8倍超预期（133万亿韩元 vs 预期116.81万亿），AI芯片需求主导业绩，带动韩国市场表现突出。亚太风险情绪跟随美伊谈判进展回暖，加密市场同步受益。"},
    {cat:"宏观数据",p:"HIGH",t:"摩根大通CEO戴蒙股东信：代币化正重塑金融体系，市场已完全打消今年降息预期",d:"摩根大通CEO Jamie Dimon在年度股东信中指出，基于区块链的代币化、稳定币与智能合约正成为传统银行的直接竞争对手。市场层面，股东信明确表示投资者已打消美联储2026年内降息的预期，警告地缘政治冲突、高资产价格与全球债务可能推高通胀与利率。摩根大通正推进区块链部门Kinexys和稳定币项目JPM Coin应对趋势变化。"},
    {cat:"宏观数据",p:"MID",t:"哈塞特：美联储主席换人后（沃什接任）预计将开始下调利率",d:"白宫经济顾问委员会主席哈塞特表示，预计在特朗普提名的Kevin Warsh正式接任美联储主席后，美联储将开始下调利率。这一表态被市场解读为政治层面对货币政策转向的信号，但独立性争议随之升温。对加密市场而言，降息预期若成真，将为风险资产提供正面支撑。"},
    {cat:"宏观数据",p:"MID",t:"黄金续涨 +0.15%、原油维持高位续涨，波动率指数持续回落",d:"黄金日内继续上涨0.15%，油价在$113/桶附近续涨，反映能源供应风险溢价持续。与此同时，波动率指数（VIX）持续回落，说明市场整体情绪有所修复。避险资产黄金与风险资产双涨格局继续，体现市场对谈判推进抱有一定期望。"},
    {cat:"全球监管",p:"HIGH",t:"SEC主席Atkins：加密\"安全港\"提案已提交白宫OIRA审核，含$500万初创豁免与$7500万成熟项目豁免",d:"SEC主席Paul Atkins表示，其提出的加密\"安全港\"框架已进入白宫管理和预算办公室（OIRA）审查流程，预计将很快正式发布。该方案包括允许加密项目在约4年内在履行信息披露义务前提下进行融资，设置初创项目$500万与成熟项目$7500万两档豁免门槛，并配套投资合约安全港及代币分类解释性指引。"},
    {cat:"全球监管",p:"MID",t:"美国法院裁定新泽西州无权限制Kalshi体育预测合约，监管权归属联邦",d:"美国联邦法院裁定新泽西州无权对Kalshi体育赛事预测合约实施州级限制，确认联邦商品期货交易委员会（CFTC）对此类预测市场合约的监管权。该判决强化了预测市场的法律地位，对Polymarket等链上预测协议的合规前景同样形成正面信号。Polymarket同日还宣布重大基础设施升级，推出原生稳定币Polymarket USD。"},
    {cat:"传统金融",p:"MID",t:"美财政部指定Robinhood与BNY Mellon协助管理特朗普\"530A账户\"资产",d:"美国财政部正式指定Robinhood和BNY Mellon作为协助管理特朗普\"530A账户\"（即共和党530A政治组织相关账户）资产的机构。此举标志着加密零售券商Robinhood进一步涉足联邦财政管理层面，强化其作为传统金融与加密领域桥梁的地位。"},
    {cat:"传统金融",p:"MID",t:"SpaceX计划5月底公开IPO招股说明书，或成年度最大科技上市事件",d:"SpaceX计划于5月底向公众公开首次公开募股（IPO）招股说明书，标志着这家马斯克旗下最具估值的私人公司正式进入上市轨道。此前SpaceX以要求各大投行订阅Grok作为承销条件引发争议，摩根士丹利、高盛、摩根大通均已同意。SpaceX上市若推进，将是近年科技领域标志性事件，对加密和科技板块风险偏好具有传导效应。"},
    {cat:"加密数据",p:"HIGH",t:"美股收盘加密板块全线上涨，MSTR领涨 +6.56%，加密情绪随亚太开盘延续",d:"4月6日美股收盘，加密概念板块全线上涨，MicroStrategy（MSTR）涨幅达6.56%领涨。加密情绪随亚太股市4月7日早盘普涨进一步延续。Coinbase比特币溢价指数4月7日早间持续转正，为3月19日以来首次，反映美国本土买盘主动性显著回升。"},
    {cat:"加密数据",p:"HIGH",t:"BTC网络日交易笔数约61.5万笔，创2024年11月牛市高峰以来新高",d:"据链上数据，比特币网络4月6日日交易笔数约61.5万笔，为2024年11月牛市高峰以来最高水平。链上活跃度的显著回升通常预示资产价格进入强势阶段，结合Coinbase溢价转正及机构买盘信号，短期BTC供需格局偏向多头。"},
    {cat:"加密数据",p:"HIGH",t:"巨鲸\"先定10个大目标\"限价$69,574加仓270枚BTC多单，当前浮盈约$552万",d:"链上监测显示，知名巨鲸\"先定10个大目标\"在BTC接近$69,574时再度加仓270枚BTC多单，当前合计持有2250余枚BTC多单，价值约$1.56亿，平均开仓均价约$67,194，强平价约$55,423，目前浮盈约552万美元。该账户历史记录显示其擅长趋势追踪，是市场重要参考指标之一。"},
    {cat:"加密数据",p:"MID",t:"SOL现货ETF美国单日净流入$24.7万；链上永续合约DEX交易量连续5个月下滑",d:"美国SOL现货ETF产品单日净流入合计24.7万美元，规模相对有限但持续流入保持正值。与此同时，链上永续合约DEX交易量连续5个月下滑，3月降至约6990亿美元（较2025年10月峰值1.36万亿大幅回落），Hyperliquid仍以约34%份额维持市场领先地位。"},
    {cat:"链上事件",p:"HIGH",t:"DARMA Capital联创Andrew Keys将质押近5年的60001枚ETH（约$1.29亿）全部转入Coinbase",d:"链上监测显示，DARMA Capital联创创始人Andrew Keys将其质押近5年的60001枚ETH（价值约1.29亿美元）全数转入Coinbase，引发市场对大规模潜在抛压的警惕。该批ETH此前长期锁仓于以太坊2.0质押合约，本次解锁转移是4月7日最受关注的链上事件之一，ETH市场承压风险值得关注。"},
    {cat:"链上事件",p:"HIGH",t:"MARA再次转出250枚BTC，3月以来累计出售已达15133枚（约$11亿）",d:"加密矿企MARA Holdings约3小时前再次向市场转出250枚BTC，自3月以来累计出售已达15133枚BTC，按当前价格约合11亿美元。矿企大规模持续卖出给BTC市场带来一定抛售压力，与此同时，Riot Platforms亦被监测疑似再次出售500枚BTC，矿企集体减仓现象值得关注。"},
    {cat:"链上事件",p:"MID",t:"Ethena将USDe中性套利策略扩展至股票与大宗商品市场，收益来源多元化",d:"稳定币协议Ethena宣布将其USDe底层产品的中性套利策略从原有加密衍生品市场扩展至股票与大宗商品市场，实现收益来源多元化。此举降低了单一市场波动对USDe收益率的影响，扩大了协议的可扩展性边界，在当前加密衍生品市场交易量持续下滑背景下具有重要战略意义。"},
    {cat:"链上事件",p:"MID",t:"Spark启动第二个月SPK回购：转入41.4万枚USDS开始执行，首月已回购2666万枚SPK",d:"MakerDAO生态Spark项目向回购地址转入41.4万枚USDS，启动第二个月SPK代币系统性回购。首月用57.2万枚USDS回购了2666万枚SPK，月度资金变化反映协议财库收入波动，但持续执行传递长期信心。回购机制持续减少流通量，对SPK价格形成结构性支撑。"},
    {cat:"链上事件",p:"MID",t:"Uniswap API接入MetaMask后占其约40%交易份额；Solana推出STRIDE与SIRN安全体系",d:"Uniswap创始人Hayden Adams披露，该平台API接入MetaMask聚合交易路由约一个月后，已占据MetaMask兑换交易约40%份额，并同步免费开放API密钥。另一方面，Solana Foundation推出STRIDE安全评估体系与SIRN应急响应网络，对TVL超1亿美元的协议提供形式化验证支持，标志着生态安全从被动补救转向主动防护。"},
    {cat:"行业趋势",p:"HIGH",t:"阿根廷总统米莱与LIBRA项目相关人员存在7通通话记录，\"无关联\"说法遭质疑",d:"据《纽约时报》报道，阿根廷总统Javier Milei在2025年2月14日LIBRA代币上线当晚，与项目相关企业家Mauricio Novelli存在7通电话记录，时间点涵盖其在X平台发布推广帖前后。新发现的手机取证信息还包括疑似付款录音及草拟资金安排文件，约定疑云$500万，进一步引发对米莱\"与项目无关联\"说法的质疑。目前米莱尚未被正式起诉，但已被列为调查重点对象。"},
    {cat:"行业趋势",p:"HIGH",t:"Anthropic拟投$2亿参与新一轮$10亿私募融资，估值传闻达$1700亿；年化收入已超$300亿",d:"Anthropic正计划向其新一轮价值约10亿美元的私募融资中自投约2亿美元，并将与博通和谷歌合作扩大AI算力。博通确认将长期向Anthropic供应谷歌TPU芯片至2031年，Anthropic届时将获得约3.5吉瓦算力资源。公司年化收入已从2025年末$90亿飙升至当前超$300亿，估值传闻达$1700亿，14倍同比增长与OpenAI差距快速缩小。"},
    {cat:"行业趋势",p:"MID",t:"OpenAI前员工成立1亿美元VC基金Zero Shot，看空vibe coding和机器人视频数据",d:"OpenAI早期员工成立1亿美元风险投资基金Zero Shot，聚焦AI基础设施和应用层投资，明确看空当前市场热炒的vibe coding方向和机器人视频数据训练赛道，认为这些方向存在泡沫化风险。与此同时，OpenAI发布13页政策白皮书，提出机器人税、全民AI财富基金及四天工作制等政策建议，标志着AI公司开始主动参与劳动力市场治理政策制定。"},
    {cat:"行业趋势",p:"MID",t:"OpenAI、Anthropic与谷歌联手通过Frontier Model Forum共享情报，应对中国AI未授权蒸馏",d:"三家AI巨头通过2023年联合创立的行业非营利组织Frontier Model Forum共享情报，联合检测违反服务条款的\"对抗性蒸馏\"行为。美国政府估计未经授权的蒸馏每年给硅谷实验室造成数十亿美元损失。此举虽受反垄断法限制而规模有限，但标志着AI安全从单打独斗走向行业集体防御，对区块链AI应用的数据合规也有参考意义。"},
    {cat:"行业趋势",p:"MID",t:"Meta内部\"Claudeonomics\"排行榜曝光：8.5万员工30天烧掉60万亿token，AI使用全面铺开",d:"Meta内部AI使用排行榜\"Claudeonomics\"曝光，显示8.5万名员工在过去30天内累计消耗超过60万亿个token，AI工具已在企业内部实现大规模普及。Meta同步宣布新一代AI模型将采用部分开源、部分闭源的混合策略，从此前激进全开源路线有所调整，折射大型科技公司在竞争与开放之间寻求新平衡。"},
    {cat:"观点研报",p:"MID",t:"Aave创始人回应Chaos Labs退出：维持双层风险管理模型，LlamaRisk接管风险评估",d:"Aave创始人Stani Kulechov回应Chaos Labs宣布退出Aave风险管理合作一事，表示协议将维持现有双层风险管理架构，由LlamaRisk接管原本由Chaos Labs负责的风险参数评估工作。此举体现Aave在去中心化治理结构下的韧性，但风险管理人员更换对协议安全性的影响仍需观察。"},
    {cat:"观点研报",p:"MID",t:"印尼首批以区块链证据为核心完成定罪的反恐融资案：3人利用加密货币资助ISIS被判有罪",d:"印尼政府判决3名个人因利用加密货币为恐怖主义融资而罪名成立，执法部门通过链上追踪技术将相关钱包地址与ISIS关联网络连接，其中一名被告通过15笔交易转出超4.9万枚USDT至境外交易平台。TRM Labs表示这可能是东南亚首批以区块链证据为核心完成定罪的反恐融资案件之一，对行业合规具有重要标杆意义。"}

  "2026-04-08": [
    {cat:"全球事件",p:"HIGH",t:"伊朗最高领袖哈梅内伊下令所有军事单位停止开火，美伊两周停火协议生效",d:"伊朗最高领袖哈梅内伊正式指示伊朗所有军事单位停止开火，配合特朗普宣布的两周停火协议落地。伊朗最高国家安全委员会宣布接受巴基斯坦的停火提议，声称\"几乎所有目标都已实现\"。伊朗将在最多15天内通过政治谈判巩固成果，核心条件包括霍尔木兹海峡协议安排、赔偿、解除制裁及释放冻结资产。市场反应激烈：油价暴跌15%、股市强劲反弹、BTC突破$71,000。"},
    {cat:"全球事件",p:"HIGH",t:"美国准备在巴基斯坦伊斯兰堡举行美伊面对面谈判，万斯、威特科夫、库什纳预计出席",d:"特朗普政府正准备在未来几天内与伊朗举行首次面对面谈判，地点很可能在巴基斯坦伊斯兰堡，由巴基斯坦出任调解员。特朗普特使威特科夫、女婿库什纳及副总统万斯预计将出席，万斯正访问匈牙利，或将增加伊斯兰堡一站。白宫表示\"目前正在讨论可能性，但总统宣布前尚未定论\"。伊朗接受停火后，面对面谈判可能性大幅提升。"},
    {cat:"全球事件",p:"HIGH",t:"美媒：停火期间伊朗和阿曼将对霍尔木兹海峡征收\"过路费\"，通航管控权博弈浮现",d:"据美国媒体报道，在两周停火协议框架内，伊朗和阿曼将对经过霍尔木兹海峡的船只征收\"过路费\"，实质上将伊朗此前要求的\"海峡管控权\"以商业化形式落地。Polymarket霍尔木兹通航恢复概率在24小时内跳升43%至57%，市场已开始交易停火红利。能源市场对此反应剧烈，WTI原油最大跌幅达15%。"},
    {cat:"全球事件",p:"MID",t:"以媒称以色列\"仍在持续打击伊朗\"，停火协议执行存在分歧",d:"以色列媒体报道称，以色列军队\"仍在持续打击伊朗\"，表明停火协议执行层面存在分歧。伊朗媒体亦指出，\"与美国的谈判并不意味着战争的结束\"，称只有在所有细节按照10点计划敲定后才会接受战争结束。美国国防部宣布将于4月9日举行关于伊朗行动的新闻发布会，被市场解读为对停火细节进行官方说明的信号。"},
    {cat:"全球事件",p:"MID",t:"巴基斯坦：与伊朗接触仍在继续，但态度坚决；消息人士称\"好消息即将到来\"",d:"在停火公告前，巴基斯坦消息人士透露\"与伊朗的接触仍在继续，各方正努力促使双方重返谈判\"，同时描述伊朗\"态度坚决且强硬\"。一位地区消息人士表示，巴基斯坦陆军参谋长阿西姆·穆尼尔元帅直接主导会谈，并预计\"当地时间当日晚间将敲定协议\"，此预期随后被停火公告证实。"},
    {cat:"宏观数据",p:"HIGH",t:"WTI原油停火后暴跌15%（$93.79/桶），黄金涨至$4,818，日韩股市大幅高开",d:"受\"特朗普宣布两周停火\"消息驱动，WTI原油日内最大跌幅达15%，最低报$93.79/桶，布伦特原油跌9.52%至$98.43。与此同时，黄金升至$4,818（+2.39%），白银涨至$76.07（+4.33%），贵金属与风险资产同步走强，体现停火前景下市场情绪全面修复。日经225开盘+1.78%，KOSPI+5.99%，三星再度领涨亚太。"},
    {cat:"宏观数据",p:"HIGH",t:"欧佩克3月产量创40年最大单月降幅：日减756万桶（降25%），伊拉克降幅最大",d:"调查显示，受中东冲突抑制主要成员国出口影响，欧佩克3月日产量暴跌756万桶（约25%），降至2200万桶，创自1989年有数据以来最大单月降幅，超过1973年阿拉伯石油禁运。伊拉克日产量减少276万桶，沙特减少207万桶，阿联酋减少144万桶。停火消息短期可能扭转供应担忧，但实际产能恢复需数周至数月时间。"},
    {cat:"宏观数据",p:"MID",t:"贝莱德：中东战争将推高美国3月CPI，预期从2.4%升至3.3%，或延迟美联储降息",d:"贝莱德策略师警告，高能源价格的影响很可能在周五（4月10日）公布的美国3月CPI数据中充分显现，经济学家预期3月未季调CPI年率将从2月的2.4%升至3.3%。中东战争造成的供给端冲击对央行政策构成挑战，可能延迟美联储降息计划。若停火成真，能源价格回落将在4月数据中体现，为降息路径提供新的支撑。"},
    {cat:"宏观数据",p:"MID",t:"美股开盘加密板块普跌：道指-0.2%、纳指-0.3%，Circle跌1.89%、Coinbase跌1.48%",d:"4月7日美股开盘，大盘小幅下行，加密概念股整体表现不佳。Circle下跌1.89%，Coinbase下跌1.48%，Robinhood下跌2.36%，MicroStrategy下跌1.44%，跌势在停火消息公布前出现（盘前至收盘TRON跌幅达7.92%）。美股加密板块整日涨跌不一，但隔夜随停火消息情绪大幅改善。"},
    {cat:"全球监管",p:"HIGH",t:"美FDIC提出新监管提案：稳定币不享有存款保险保障，与银行存款性质有别",d:"美国联邦存款保险公司（FDIC）提出新监管提案，明确拟定稳定币产品不享有存款保险（FDIC）的保障，确认其与传统银行存款在监管性质上的根本区别。这一立场将强化稳定币持有者的风险意识，对发行方的资产储备和信息披露要求形成更严格的隐性压力。该提案与当前国会讨论中的稳定币法案形成并行，将对USDC等银行托管稳定币的监管框架产生深远影响。"},
    {cat:"全球监管",p:"HIGH",t:"Coinbase获澳大利亚金融服务牌照（AFSL），将在澳提供加密货币和股票永续合约交易",d:"Coinbase获得澳大利亚金融服务牌照（Australian Financial Services Licence），将为澳大利亚用户提供加密货币及股票永续合约交易服务。这是Coinbase在亚太地区合规布局的重要里程碑，也是全球主要合规交易所持续拓展非美国市场的最新案例。股票永续合约的加入意味着Coinbase正在向综合金融服务平台演进。"},
    {cat:"加密数据",p:"HIGH",t:"BTC突破$71,000（+2.5%），ETH突破$2,200，Polymarket霍尔木兹通航概率24小时跳升43%",d:"OKX行情显示，BTC突破$71,000，报$71,010.8，24小时涨幅2.5%；ETH随后突破$2,200，某巨鲸约$2200万的ETH空单在$2,200被迫触发止损平仓。停火消息驱动风险资产全线走高，Polymarket关于\"霍尔木兹海峡通航4月30日前恢复正常\"的概率在24小时内从约14%跳升43个百分点至57%，当前交易量约407万美元。"},
    {cat:"加密数据",p:"HIGH",t:"4月7日美国BTC现货ETF净流入6665枚（约$4.7亿），ETH ETF净流入39768枚，SOL ETF+2919枚",d:"据Lookonchain监测，4月7日美国比特币现货ETF合计净流入6665枚BTC（按$71,000计约合4.73亿美元），创近期新高；以太坊现货ETF净流入39768枚ETH（按$2,150计约合$8550万），规模相当可观；SOL现货ETF净流入2919枚SOL。ETH ETF单日净流入规模以枚数计远超BTC ETF，反映机构对以太坊的增量配置意愿快速上升，与ETH/BTC汇率改善趋势吻合。"},
    {cat:"加密数据",p:"HIGH",t:"巨鲸\"先定10个大目标\"平仓BTC全部多单，获利超$1200万；另一巨鲸40倍空单转多持仓$800万",d:"链上监测显示，知名巨鲸\"先定10个大目标\"已将持有的BTC多单全部平仓出局，盈利超1200万美元。与此同时，另一巨鲸将40倍杠杆的BTC空头头寸紧急翻转为多头，当前持仓规模超800万美元，反映出市场方向性共识快速向多头切换。ETH突破$2,200后，一笔价值约2200万美元的ETH空单被迫止损平仓，加剧轧空行情。"},
    {cat:"加密数据",p:"MID",t:"某巨鲸25倍ETH空单+17倍BTC空单双空合计$1590万，多空博弈白热化",d:"据Hyperinsight监测，一个以0x610开头的巨鲸地址在平仓多单后的10分钟内同时建立ETH和BTC双向空单：以25倍杠杆空ETH 3000枚（均价$2,100，约$630万）、以17倍杠杆空BTC 140枚（均价$68,550，约$960万），两笔空单合计$1590万。此举发生于BTC拉升前的空头试探阶段，随后ETH和BTC均相继突破关键价位，该空头面临较大被轧风险。"},
    {cat:"链上事件",p:"MID",t:"Arthur Hayes向做市商转移265,461枚ETHFI与3.55万枚AUKI，疑似进行流动性管理",d:"链上监测显示，Arthur Hayes的钱包地址向做市商转移了265,461枚ETHFI代币与35,500枚AUKI代币。ETHFI是EigenLayer生态质押收益代币，此次大额转移引发市场对潜在卖压的关注。Hayes同期公开表达\"只在买HYPE\"的观点，此次链上操作可能是其投资组合再平衡的组成部分。"},
    {cat:"链上事件",p:"MID",t:"Robinhood上线ORCA代币交易",d:"Robinhood加密交易平台正式上线ORCA代币，根据官方页面显示已开放交易。ORCA是Solana生态主流DEX Orca的治理代币，此次上线Robinhood有助于扩大其美国零售用户触达。"},
    {cat:"行业趋势",p:"MID",t:"CZ自传《Freedom of Money》向全球正式开放，全部收益用于慈善",d:"前币安CEO赵长鹏（CZ）宣布其自传《Freedom of Money》已在部分国家上线，并于4月8日凌晨0点向全球用户正式开放。CZ表示，书籍全部销售收益将用于慈善。书中CZ透露从未认真考虑过收购FTX，对帮助SBF\"兴趣不大\"，是此前坍塌危机中其公开的个人立场首次以书面形式系统呈现。"},
    {cat:"行业趋势",p:"MID",t:"马斯克修改OpenAI诉状：1500亿美元赔偿全归OpenAI慈善部门，要求解除Altman董事身份",d:"马斯克修改了针对OpenAI及微软的诉讼，主动放弃全部个人索赔，若胜诉1500亿美元赔偿金全部归OpenAI慈善部门；同时要求将Sam Altman从非营利组织董事会中除名，并要求Altman和Brockman将所有股权和财务收益移交慈善部门。OpenAI回应称这是\"由自负、嫉妒和拖慢竞争对手的欲望驱动的骚扰行动\"，案件预计本月在加州奥克兰开庭。"},
    {cat:"行业趋势",p:"MID",t:"Coinbase将CHIP代币列入上币路线图",d:"Coinbase将CHIP（CHIP）代币列入上币路线图（Listing Roadmap），这意味着该代币有望在未来一段时间内正式上线Coinbase平台交易。CHIP是一个以博彩和游戏为核心应用场景的代币项目，Coinbase路线图式上币通常在正式上线前带动相关资产价格上涨。"},
    {cat:"观点研报",p:"MID",t:"Arthur Hayes：当前只买入一项资产——HYPE；Hyperliquid生态持续获机构关注",d:"BitMEX联创Arthur Hayes公开表示，当前市场环境下自己\"只在买入一项资产，就是HYPE\"。HYPE是去中心化衍生品交易所Hyperliquid的原生代币，Hyperliquid近期在DEX市场份额持续领先（占永续合约DEX约34%），与此同时Hayes链上大额转移ETHFI的行为也被市场视为其正在集中押注HYPE的侧证。"},
    {cat:"观点研报",p:"MID",t:"易理华：当前类2019年，今年一定是二级市场抄底最佳时机；止盈策略\"边走边看\"",d:"Liquid Capital创始人易理华表示，当前加密市场环境与2019年高度相似，具体表现为二级市场流动性下降、一级投资信心不足及行业人员流动加剧。他认为\"今年一定是二级市场抄底最佳时机\"，并提及2019年的相关布局在随后牛市中表现突出。在止盈策略上，易理华采取\"边走边看\"的渐进式减仓方式，并表示今年将持续寻找一级投资机会。"}

  "2026-04-09": [
    {cat:"全球事件",p:"HIGH",t:"伊媒：霍尔木兹海峡已全面关闭，迫使油轮返航；革命卫队公布通行线路图（以免触碰水雷）",d:"伊朗Press TV报道，霍尔木兹海峡已全面关闭，并迫使油轮返航。随后伊朗伊斯兰革命卫队公布霍尔木兹海峡安全通行线路图，指引船只绕开布雷区域通行，暗示海峡内已布设水雷。这一消息与昨日宣布的两周停火协议形成直接矛盾，能源市场的停火溢价面临重新消化压力。"},
    {cat:"全球事件",p:"HIGH",t:"美伊临时停火或因以色列持续打击而破裂；以色列总理：随时准备重返战斗",d:"媒体报道称美伊临时停火协议面临破裂风险，核心原因是以色列未停止对伊朗的军事打击行动。以色列总理内塔尼亚胡明确表态，\"我们取得了曾经看似不可能的巨大成就，还有更多目标要完成，要么通过升级、要么通过重启战斗来实现，我们随时准备在需要时重返战斗。\"Polymarket上\"以色列4月30日前对伊朗核电站采取军事行动\"概率已升至96%。"},
    {cat:"全球事件",p:"HIGH",t:"阿联酋和科威特指责伊朗停火后发动17枚导弹+35架无人机袭击；沙特关键石油管道遭袭",d:"阿联酋国防部声称，\"自停火生效以来，伊朗公然发动袭击，共发射了17枚弹道导弹和35架无人机，防空系统已成功应对\"；科威特国防部亦指责伊朗在停火后继续以其安全和重要基础设施为目标。同时，沙特一条关键东西向石油管道遭到袭击。停火协议有效性受到多方公开质疑。"},
    {cat:"全球事件",p:"MID",t:"美国国防部长：停火只是一次暂停，联军随时准备恢复作战；伊朗绝不能拥核",d:"美国国防部长赫格塞思表示，美国周二夜间发动800次空袭摧毁了伊朗国防工业基础，使其\"再也无法制造导弹、火箭和无人机\"。他强调\"停火意味着伊朗不会拥有核武器，美国的军事目标已达成\"，但\"停火只是一次暂停，联军仍随时准备恢复作战\"。此外他重申伊朗高浓缩铀问题必须解决，\"要么由伊朗主动交出，要么美方将采取行动移除\"。"},
    {cat:"全球事件",p:"MID",t:"AXIOS：对伊朗炼油厂的攻击并非美国或以色列实施；Polymarket停火账户集群获利$60万引发内幕质疑",d:"一名美国官员否认对伊朗炼油厂的攻击是美国或以色列所为，引发行动方身份猜测。与此同时，链上分析平台Bubblemaps监测到一批关联Polymarket账户，在美伊停火预测中获利约$60万（以色列发动奇袭、以色列崛起雄狮行动均曾精准押中），这批账户在获利后集体更名，疑似掌握非公开信息来源。"},
    {cat:"全球事件",p:"MID",t:"特朗普考虑撤出不支持伊朗战争的北约盟国美军，或关闭西班牙/德国基地",d:"据《华尔街日报》，特朗普政府正在讨论将美军从未支持美以伊朗行动的北约成员国撤出，可能关闭西班牙或德国的美军基地，并重新部署至波兰、罗马尼亚、立陶宛、希腊等支持国。该计划尚处初步阶段，特朗普无权在未经国会批准情况下退出北约，但此举对北约内部团结和欧洲安全格局将产生深远影响。"},
    {cat:"货币政策",p:"HIGH",t:"美联储\"传声筒\"Timiraos：通胀放缓慢于预期，三个交织因素驱动——关税、油价传导、预期锚定松动",d:"《华尔街日报》记者Nick Timiraos（美联储传统传声筒）援引美联储会议纪要称，\"绝大多数\"官员认为通胀缓解步伐可能慢于预期。三项交织因素：①关税对商品价格的影响消退需更长时间；②油价对核心通胀的传导效应；③多年高于目标的通胀使预期更脆弱。这一表态降低了市场对近期降息的预期。4月10日将公布美国3月CPI数据，为关键风险事件。"},
    {cat:"货币政策",p:"MID",t:"美联储戴利：经济基本面仍处良好状态，消费者支出与企业投资稳定，但通胀担忧不可忽视",d:"旧金山联储主席戴利表示，尽管伊朗战争带来不确定性和波动，美国经济基本面\"仍处于良好状态\"，消费者继续支出、企业继续投资，劳动力市场保持稳固。她承认存在推高通胀的风险因素，这是美联储持续关注的重点，但整体态度偏鸽。"},
    {cat:"全球监管",p:"HIGH",t:"美国财政部拟出台稳定币反洗钱新规，要求合规主体强化制裁筛查与可疑交易上报",d:"美国财政部正在研究针对稳定币的反洗钱新规，拟强化制裁合规要求，包括要求稳定币发行商和相关服务商对用户实施OFAC制裁名单筛查，以及可疑交易的主动上报义务。该提案与此前FDIC的稳定币不享存款保险保障提案形成配套，共同构建美国稳定币监管框架。对USDT、USDC等主流稳定币的合规成本和运营机制将产生直接影响。"},
    {cat:"全球监管",p:"MID",t:"韩国执政党提出《数字资产基本法》，拟强化稳定币监管，要求发行商持有充足储备",d:"韩国执政党提出《数字资产基本法》草案，核心条款包括强化稳定币监管框架，要求稳定币发行商持有与发行量相等的充足储备资产，并接受定期审计。韩国此前已对加密交易所推行实名制和严格KYC，新法案若通过将进一步覆盖稳定币发行端的监管缺口，与美国财政部的稳定币新规动向形成全球监管同步收紧的信号。"},
    {cat:"宏观数据",p:"MID",t:"黄金跌至$4,715/盎司，原油小幅回涨，波动率指数大幅回落；美股加密板块收盘普涨",d:"受停火后部分避险需求消退影响，黄金从前日高点$4,818回落至$4,715/盎司；WTI原油随停火疑虑小幅回升；比特币波动率指数（BVIX）大幅回落，市场情绪修复。美股收盘加密板块普涨，ABTC（比特币矿业相关ETF）领涨逾10.63%，加密情绪跟随地缘政策预期修正持续回暖。"},
    {cat:"宏观数据",p:"MID",t:"Strategy优先股STRC首日募资规模可购超2500枚BTC，相当于矿工5倍新增供应量",d:"MicroStrategy旗下Strategy的优先股STRC今日公开融资，募集资金规模按当前价格可购超2500枚BTC，相当于比特币矿工约5倍的新增供应量（当前每日约450枚）。STRC采用优先股结构，为MicroStrategy提供比普通股更低成本的BTC囤积融资渠道，持续强化其BTC国库战略。"},
    {cat:"加密数据",p:"HIGH",t:"BTC反弹突破$72,000，但期权市场隐含波动率持续下降，Greeks.live：为技术反弹而非趋势延续",d:"BTC价格快速上涨至$72,000，但Greeks.live指出，\"主要期限期权IV仍在下降，甚至末日期权IV也在降\"，表明此次反弹主要是\"解除黑天鹅引发暴跌担忧\"，而非预期价格持续上涨。隐含波动率下降显示专业交易员不认为本次上涨能形成持久趋势；偏斜度负偏程度减弱说明暴跌保险需求降低，为技术性修复。"},
    {cat:"加密数据",p:"MID",t:"Hyperliquid RWA交易量占总量47.1%逼近历史前高，TradeXYZ 24小时成交额达50亿美元",d:"受美伊停火协议影响原油价格暴跌，Hyperliquid平台HIP-3生态项目TradeXYZ（提供7×24小时大宗商品现实资产永续合约）成交量大幅放量，24小时成交额达50.1亿美元。Hyperliquid平台RWA交易量占总交易量比例升至47.1%，逼近历史前高。地缘政治事件成为链上RWA交易需求的强力催化剂，体现链上衍生品在重大市场事件中的对冲价值。"},
    {cat:"链上事件",p:"HIGH",t:"以太坊基金会昨夜出售3750枚ETH（均价$2,214，共约$830万），新一轮潜在抛压信号",d:"以太坊基金会（EF）再次在链上出售3750枚ETH，成交均价约$2,214，合计约$830万美元。以太坊基金会历次卖出ETH的操作均引发市场对抛压的关注，此次出售发生在BTC反弹至$72,000、ETH跟随上涨的节点，时机选择被市场解读为基金会判断当前价格为相对合理出货位。"},
    {cat:"链上事件",p:"MID",t:"麻吉黄立成滚仓做多ETH：持仓10,875枚ETH多单（$2,429万），强平价$2,061",d:"知名交易员黄立成（麻吉）在3月26日遭遇大额强平后，向Hyperliquid补入70万美元并重启多单，目前持有10,875枚ETH多单，仓位价值约$2,429万，浮盈超$100万，当前强平价为$2,061。$2,061的强平价位与ETH当前价格差距约7%，若地缘风险再度升温引发ETH回落，存在二度强平风险。"},
    {cat:"链上事件",p:"MID",t:"Loracle新建10倍杠杆WTI原油空单约$1,780万，开仓均价$93.68；某巨鲸做空288枚BTC",d:"Hyperliquid早期贡献者Loracle新建190,738份WTI原油合约空单，10倍杠杆，开仓均价$93.68，仓位价值约$1,780万，清算价位$100.53，押注原油价格继续低于$100。与此同时，另一巨鲸做空288.69枚BTC，目前浮盈$20.9万，两笔链上大单均体现出专业交易者对停火协议能否持续的怀疑态度。"},
    {cat:"链上事件",p:"MID",t:"Morpho推出Morpho Agents Beta，支持自然语言完成协议集成；Claude推出Managed Agents",d:"去中心化借贷协议Morpho推出Morpho Agents Beta，允许开发者与机构通过自然语言指令在几分钟内完成Morpho协议的集成与产品开发，目前支持以太坊和Base链。Anthropic同期推出Claude Managed Agents，可快速构建和部署AI代理。两款产品均指向AI × DeFi集成的加速落地，降低链上开发门槛。"},
    {cat:"行业趋势",p:"HIGH",t:"Michael Saylor：BTC或已在$60,000附近触底，量子计算对比特币的威胁被严重夸大",d:"MicroStrategy创始人Michael Saylor表示，比特币可能已在$60,000附近触底，当前区间属于长期配置窗口。对于市场担忧的量子计算威胁，Saylor认为被\"严重夸大\"，理由是比特币可在必要时通过软分叉升级密码学标准，量子风险从技术层面可控。Saylor一贯鲜明的BTC多头立场与当前BTC $72,000的反弹态势形成相互印证。"},
    {cat:"行业趋势",p:"MID",t:"CZ新书《Freedom of Money》披露：持有LUNA至崩盘不卖，因\"不想被视为Binance跑在散户前面\"",d:"CZ在新书中首次完整披露币安持有Terra LUNA的决策过程：币安2018年以$300万投资Terra获LUNA代币，崩盘时市值达$16亿，团队建议卖出但CZ拒绝，理由是卖出会加剧市场恐慌，且\"不想大家觉得Binance跑在散户前面\"，体现出大型机构投资人复杂的道义与责任考量。币安至今仍持有部分LUNC代币。"},
    {cat:"观点研报",p:"MID",t:"Yuga Labs与艺术家Ryder Ripps就无聊猿商标纠纷达成和解",d:"Yuga Labs（Bored Ape Yacht Club母公司）与艺术家Ryder Ripps就商标纠纷正式达成和解协议。Ryder Ripps此前以艺术批评为由发行RR/BAYC系列仿冒NFT，Yuga Labs起诉其商标侵权。此次和解意味着NFT领域知识产权纠纷通过庭外协议解决，具体和解条款未公开。"}
  ],
  "2026-04-10": [
    {cat:"全球事件",p:"HIGH",t:"周四霍尔木兹仅6艘船通过，特朗普公开指责伊朗\"表现非常糟糕，与协议完全不符\"",d:"船舶追踪公司MarineTraffic数据显示，周四（4月9日）共有6艘船通过霍尔木兹海峡，远低于战前每日60艘以上的正常水平。特朗普在社媒公开谴责：\"在允许石油通过霍尔木兹海峡方面，伊朗的表现非常糟糕，甚至可以说是不光彩的，这与我们达成的协议完全不符！\"此前伊朗副外长已确认代表团赴伊斯兰堡参加和平谈判，但坚持以色列须先停止对黎巴嫩袭击为前提条件。"},
    {cat:"全球事件",p:"HIGH",t:"同夜三处战鼓：俄宣布32小时复活节停火、黎以谈判启动、胡塞威胁红海——伊斯兰堡谈判48小时为关键节点",d:"同一个夜晚三线并发：普京宣布东正教复活节停火32小时（北京时间4月11日21时开启），泽连斯基响应；黎巴嫩呼吁与以色列临时停火谈判，美以黎三方下周将在华盛顿国务院会面，但以色列坚持\"解除真主党武装前不会停火\"；胡塞武装威胁收紧红海通行。分析认为，伊斯兰堡谈判、黎以直接对话、霍尔木兹通行权三条线同步推进，未来48小时为中东局势关键节点。"},
    {cat:"全球事件",p:"MID",t:"美媒：美国在黎巴嫩停火问题上\"摇摆不定\"，万斯称存在\"合理误解\"",d:"CBS报道称，内塔尼亚胡与特朗普通话后，美国立场发生变化，黎巴嫩已成为美伊初步外交中最棘手的问题之一。多位外交消息人士称特朗普此前被告知停火协议将适用于整个中东（含黎巴嫩），但万斯将立场变化归咎于\"双方对协议条款存在合理的误解\"并指责伊朗。此前美国已警告白宫工作人员不得利用内幕信息参与预测市场交易。"},
    {cat:"全球事件",p:"MID",t:"俄罗斯宣布东正教复活节32小时停火；波兰央行将黄金储备目标上调至700吨",d:"俄罗斯总统普京宣布围绕东正教复活节期间实施32小时停火，乌克兰总统泽连斯基随即响应，停火窗口北京时间4月11日21时开启。与此同时，波兰央行行长表示将持续增持黄金至700吨（目前已达580吨），在地缘政治持续动荡背景下，欧洲央行的去美元化储备布局步伐进一步加快。"},
    {cat:"宏观数据",p:"HIGH",t:"【今日关键事件】美国3月CPI数据今日公布，市场预期年率从2.4%升至3.3%",d:"美国3月CPI数据将于今日（4月10日）公布，市场预期未季调CPI年率将从2月的2.4%上升至3.3%，核心CPI预期约3.0%。贝莱德此前已警告中东战争高能源价格将在3月数据中充分体现。若数据超预期，将进一步压缩美联储降息空间；停火信号若延伸，4月数据或出现回落拐点。今日数据为近期最关键宏观风险事件，需密切关注市场反应。"},
    {cat:"宏观数据",p:"MID",t:"美股收盘加密板块涨跌不一，Circle（CRCL）跌超9.34%；黄金回落至$4,758，原油小幅回升",d:"4月9日美股收盘，加密概念股表现分化：Circle（CRCL）跌超9.34%领跌，其他加密股涨跌不一。大宗商品方面，黄金从前日高位继续回落至$4,758/盎司，WTI原油受霍尔木兹通行受阻影响小幅回升，波动率指数继续走低。日韩股市4月10日早盘分别高开1.59%（日经）和2.12%（KOSPI），延续亚太风险偏好修复态势。"},
    {cat:"全球监管",p:"HIGH",t:"白宫警告员工禁止以内幕信息参与预测市场交易，3月23日停火公告前已出现石油期货异常成交量",d:"白宫已向员工发出内部警告，禁止利用与政策相关的非公开信息在预测市场进行交易。该警告发布于3月23日，恰在特朗普宣布暂停对伊朗行动前后，期间石油期货成交量在政策公布前短期内大幅增加，Polymarket平台部分账户也因精准预测相关事件获利约$60万（此前报道）。白宫警告确认了信息不对称担忧的真实性，对预测市场监管具有重要警示意义。"},
    {cat:"全球监管",p:"HIGH",t:"贝森特+鲍威尔紧急召见华尔街CEO：Anthropic新模型Mythos可识别几乎所有主流OS和浏览器漏洞，金融监管拉响警报",d:"美国财政部长贝森特与美联储主席鲍威尔在华盛顿财政部紧急召集花旗、摩根士丹利、美国银行、富国银行、高盛（共五大系统重要性银行）CEO，专题讨论Anthropic最新AI模型Mythos的网络安全威胁。Mythos被确认可在用户指令下识别并利用几乎所有主流OS和浏览器漏洞，监管机构担忧其落入黑客之手将开启新型网络攻击纪元。Anthropic目前仅向亚马逊、苹果和摩根大通开放，纳入\"Project Glasswing\"安全修补项目，同时与特朗普政府就五角大楼将其列为\"供应链风险\"展开法律博弈。"},
    {cat:"链上事件",p:"HIGH",t:"Grayscale昨夜质押83,200枚ETH（约$1.84亿）；WLFI下周拟提交代币分阶段解锁提案",d:"Onchain Lens监测显示，Grayscale于昨夜完成83,200枚ETH质押，按昨日均价约$2,214计算，价值约$1.84亿（83,200 × $2,214 ≈ $1.842亿）。另，WLFI（World Liberty Financial）官方宣布将于下周提交治理提案，采用\"结构化分阶段释放机制\"解锁早期零售购买者代币，并非一次性解锁；USD1年化收入约$1.595亿，6个月内已在二级市场回购约4.35亿枚WLFI代币，累计约$6,558万。"},
    {cat:"链上事件",p:"MID",t:"独立矿工以\"300年一遇\"概率挖出比特币区块#944,306，仅70TH算力获3.125 BTC全额奖励",d:"一名通过CKPool独立挖矿的矿工成功挖出比特币第944,306号区块，共获奖励3.128枚BTC（含3.125枚区块补贴+0.003枚手续费，按$72,000计约合$22.5万）。该矿工仅持有70TH算力，CKPool开发者Con Kolivas表示\"这种规模矿工每天挖出区块的概率约为十万分之一，平均需约300年才可能发生一次\"。此事件体现了比特币挖矿的无许可性和去中心化特征。"},
    {cat:"链上事件",p:"MID",t:"Galaxy Digital全年净亏损$2.41亿（含未实现亏损），核心业务EBITDA盈利$2.16亿，股价涨超11%",d:"Galaxy Digital发布年度报告：全年净亏损约$2.41亿，主要受数字资产及投资头寸未实现亏损拖累；剔除会计处理影响后，调整后EBITDA盈利约$2.16亿；数字资产核心业务（含交易、借贷、资产管理、质押服务）调整后毛利润约$5.05亿。财报发布后公司股价涨逾11%，市场对核心业务盈利能力的认可强于账面亏损的影响。"},
    {cat:"行业趋势",p:"HIGH",t:"Anthropic正探索自行设计AI芯片，计划处于早期阶段；SpaceX 2025年因AI投入亏损近$50亿",d:"路透社援引知情人士称，Anthropic正在探索自行设计AI芯片的可能性，但尚未确定方案也未组建专项团队，计划仍处于早期阶段，也可能最终决定仅采购芯片。另，SpaceX 2025年全年录得接近$50亿亏损，主要拖累来自AI基础设施及算力投入大幅增加，反映出科技头部企业在AI军备竞赛中的资本开支压力。Anthropic自研芯片动向若落地，将直接冲击英伟达主导的AI算力市场格局。"},
    {cat:"行业趋势",p:"MID",t:"Covenant AI宣布退出Bittensor，质疑其实际治理中心化；旗下Covenant-72B为当前最大去中心化LLM",d:"Bittensor生态知名子网项目Covenant AI（原Templar）宣布退出Bittensor网络，指其\"实际治理权仍集中于少数人\"，决策缺乏透明流程。该团队曾完成Covenant-72B模型训练（720亿参数，70余名独立贡献者协作完成，被视为当前规模最大的去中心化LLM预训练实践之一，曾获Nvidia CEO和Anthropic联合创始人公开认可）。此次出走事件引发对去中心化AI网络实际治理状态的广泛讨论。"},
    {cat:"行业趋势",p:"MID",t:"OpenAI拟推每月$100 ChatGPT Pro订阅，Codex使用量将提升约10倍",d:"OpenAI计划推出每月$100的ChatGPT Pro高级订阅，核心卖点是Codex（AI代码生成工具）使用量将提升约10倍。这一定价显示OpenAI正在面向专业开发者和高强度AI编程用户推进分级付费策略，与Claude Code等产品的竞争态势进一步升温。Codex使用量的大幅提升对依赖OpenAI API的加密开发者工具链同样具有参考价值。"},
    {cat:"行业趋势",p:"MID",t:"美国XRP现货ETF单日净流出$66.12万；RAVE代币日内涨超240%",d:"美国XRP现货ETF产品4月9日单日合计净流出$66.12万，在近期加密ETF普遍净流入背景下略显异常。与此同时，小市值代币RAVE短时突破$1.24，日内涨幅超240%，属于短期情绪性炒作，来源不明，不建议追涨。"}

  "2026-04-11": [
    {cat:"全球事件",p:"HIGH",t:"美伊谈判今日在伊斯兰堡正式开启：万斯率队，伊朗警告若15天内谈崩将发动\"毁灭性打击\"",d:"美国副总统万斯、总统特使威特科夫、特朗普女婿库什纳率美方代表团赴巴基斯坦伊斯兰堡，与伊朗议长Kalibaff率领的代表团展开直接谈判，这是两国约40天激烈对抗后的首次面对面接触。伊朗最高国家安全委员会表示谈判最长持续15天。伊朗警告称，若无法达成各方接受的协议，将对美以利益发动\"毁灭性打击\"。美国坚持停止铀浓缩为红线，并要求霍尔木兹安全通行；伊朗则要求黎巴嫩停火及解冻资产为前提。"},
    {cat:"全球事件",p:"HIGH",t:"霍尔木兹昨日仅9艘船通过，伊朗承认无法找到所有水雷；特朗普：\"海峡将很快恢复通行\"",d:"航运情报公司Kpler数据显示，4月10日通过霍尔木兹海峡的船只从前日6艘增至9艘，但仍远低于正常水平（战前每日60艘以上）。美国《纽约时报》援引知情人士称，伊朗难以完全重开海峡的核心障碍在于无法定位其之前布设的所有水雷，且缺乏清除能力。特朗普同日在社媒发文：\"霍尔木兹海峡将很快恢复正常通行。\"黎巴嫩与以色列同意举行停火谈判，美以黎三方下周将在华盛顿国务院举行首次正式会议。"},
    {cat:"全球事件",p:"MID",t:"美能源部从战略石油储备借出850万桶；阿尔忒弥斯2号载人飞船安全返回地球",d:"美国能源部宣布将从战略石油储备（SPR）向4家公司出借850万桶原油，以应对霍尔木兹通行受阻导致的能源供应压力，维持市场稳定供给。同日，NASA阿尔忒弥斯2号载人飞船完成绕月测试任务后安全返回地球，这是50年来首次载人绕月任务，为未来载人登月奠定基础；此次成功对太空经济板块具有中期催化作用。"},
    {cat:"宏观数据",p:"HIGH",t:"美国3月CPI月率+0.9%创2022年以来最大涨幅，年率3.3%；能源油价贡献近3/4月度涨幅",d:"美国劳工统计局公布3月CPI数据：季调月率+0.9%，为2022年以来最大单月涨幅；未季调年率+3.3%；核心CPI（剔除食品能源）月率仅+0.2%，涨幅明显收窄，说明此轮通胀高度集中于能源板块。分析指出，汽油价格上涨贡献了近3/4的月度CPI涨幅，主要受伊朗-以色列冲突持续推高油价影响。此次数据超出市场预期，美联储今年内降息空间进一步压缩，短期利率期货在数据发布后回吐部分涨幅。"},
    {cat:"宏观数据",p:"HIGH",t:"美联储年内降息\"仅一次\"押注上升；美国4月一年期通胀预期初值4.8%，大幅超预期4.3%",d:"3月CPI数据发布后，市场对美联储年内降息一次（而非两次以上）的押注明显上升，短期利率期货在CPI公布后快速回吐前期涨幅。同日，密歇根大学4月消费者信心调查公布：一年期通胀预期初值4.8%，超过市场预期4.3%，大幅高于前值3.8%，创近年新高。两组数据叠加强化通胀未消信号，市场普遍预期美联储将在更长时间内维持当前利率水平，美元小幅走强。"},
    {cat:"全球监管",p:"MID",t:"币安为阿联酋约千名员工提供临时搬迁至港/东京/吉隆坡选项；TOKEN2049迪拜正式延期至2027",d:"受中东局势影响，币安向在阿联酋的约1,000名员工提供自愿临时搬迁选项，可选择转至香港、东京、吉隆坡或曼谷，阿联酋业务正常运营，全球用户服务未受影响。TOKEN2049迪拜活动正式宣布延期至2027年。CZ随后在社媒辟谣称\"相关报道存在误导性，刻意将阿联酋形象化为负面\"，强调该政策是币安一直以来的灵活工作地点机制，并非新政策，还暗示将在迪拜举办新书签售活动。"},
    {cat:"全球监管",p:"MID",t:"OpenAI将被欧盟《数字服务法》归类为\"超大型在线搜索引擎\"，ChatGPT面临更严格监管",d:"据消息人士透露，OpenAI将被欧盟委员会依据《数字服务法》（DSA）纳入监管，并归类为\"超大型在线搜索引擎\"，这意味着ChatGPT将面临严格的算法透明度、虚假信息治理及数据保护要求，违规最高处全球营收6%的罚款。这是欧盟针对生成式AI在搜索领域影响力的首个重大监管行动，对Perplexity、Google AI Overviews等竞争产品亦将形成示范效应，也可能推动加密领域AI应用在欧盟合规方面面临更高门槛。"},
    {cat:"链上事件",p:"HIGH",t:"以太坊基金会以$2,221均价出售5,000枚ETH，换取1,110万枚DAI；链上已可追踪",d:"Onchain Lens监测显示，以太坊基金会（EF）在4月10日深夜至4月11日早间完成出售5,000枚ETH，按$2,221均价计算共获得约1,110万枚DAI（5,000 × $2,221 = $11,105,000 ≈ $1,110万）。EF此前已多次在市场阶段性高位出售ETH用于运营支出，此次出售规模居近期较大水平。社区部分人士认为此举具有一定抛压，但EF表示出售收益将用于支持生态系统研究与开发。"},
    {cat:"链上事件",p:"HIGH",t:"Strategy通过STRC再购3,468枚BTC，按当日均价约$72,000估算总价值约$2.50亿",d:"Michael Saylor旗下Strategy宣布今日通过STRC（Strategy Convertible Reserve Capital）工具购买3,468枚比特币，购入价格原文未披露；按4月10日-11日BTC约$72,000均价估算，本次购入约合$2.50亿（3,468 × $72,000 ≈ $2.497亿）。此次为Strategy今年以来持续购入的延续。BTC持仓量持续创历史新高，进一步强化其\"企业比特币财库\"战略定位；市场解读此举为对BTC中长期价值的强信心表态。"},
    {cat:"链上事件",p:"MID",t:"美国XRP现货ETF单日净流入909.39万美元，完成从净流出到净流入的180度逆转",d:"美国XRP现货ETF产品4月10日单日合计净流入909.39万美元，较前一日（4月9日净流出$66.12万）实现明显逆转。ETF资金流向数据通常被视为机构/大户短期情绪的重要风向标，此次转正说明在宏观数据超预期背景下，机构资金仍在选择性布局XRP相关产品。与此同时，美国政府地址也向Coinbase转入2.4枚比特币，值得持续关注。"},
    {cat:"链上事件",p:"MID",t:"BTC空头巨鲸40倍杠杆遭连续爆仓合计$4,333万：BTC涨破$72,000触发两轮清算",d:"Hyperinsight链上监测显示，一以\"0x2fc\"开头的地址在BTC价格涨破$72,000后，其40倍杠杆BTC空头头寸遭连续清算：第一轮爆仓423.4枚BTC（约$3,050万，单笔最大$2,440万）；第二轮176枚BTC（约$1,283万），两轮合计$4,333万。该地址三次开立40x杠杆空头均以爆仓告终，剩余仅67枚BTC仓位（约$482万），总亏损超$580万。分析认为这是典型的\"确认偏误+赌徒谬误\"式加仓模式，高杠杆做空趋势资产风险极高。"},
    {cat:"行业趋势",p:"MID",t:"OpenAI创始人Sam Altman住所遭燃烧瓶袭击；OpenAI声明已协助警方调查",d:"美国警方证实，OpenAI创始人兼CEO Sam Altman在旧金山的住所发生燃烧瓶袭击事件，现场有燃烧痕迹，Altman本人未在场未受伤。OpenAI随后发声明称已协助警方调查，事件性质被初步定性为蓄意破坏而非随机犯罪。分析认为，随着AI企业高管的社会影响力持续扩大，针对AI领导人的极端行为风险正在上升，部分机构投资者将此视为AI行业商业化进程中的额外不确定性因素。"},
    {cat:"行业趋势",p:"MID",t:"加密初创Q2首周融资7,600万美元，累计已近5亿；Pharos获$4,400万A轮领跑，专注RWA+L1",d:"2026年第二季度第一周（截至4月10日），全球加密初创公司合计融资约7,600万美元，2026年累计融资接近5亿美元。最大轮次为Pharos Network的4,400万美元A轮（SNZ Holding、Chainlink、Flow Traders投资），专注于以太坊兼容高性能L1公链，重点支持RWA（真实世界资产）和去中心化基础设施。其他代表性轮次：Oh（Web3 AI平台）750万美元A轮（Maven 11领投）；Kulipa（加密支付卡）620万美元种子轮（Flourish Ventures、1kx投资）。"},
    {cat:"行业趋势",p:"MID",t:"Circle发布2026互联网金融系统愿景：Fast Transfer跨链+CCTP扩展至EURC/cirBTC/RWA",d:"Circle在官方文件中发布2026年互联网金融系统（IFS）路线图，三大核心方向：①跨链互操作基础设施，推出\"Fast Transfer\"功能，无需等待源链最终确认即可完成结算；②资产扩展，将CCTP协议由仅支持USDC扩展至EURC、USYC、cirBTC及多类RWA；③开发者工具套件（Bridge Kit、Deposit Kit、Fee Service），简化多链集成复杂度。Circle上日股价（CRCL）刚经历CPI数据冲击后小幅反弹2.3%，此次路线图发布被视为其上市后首个重大战略宣示。"}

  "2026-04-12": [
    {cat:"全球事件",p:"HIGH",t:"美伊通宵三轮谈判：外媒称仅霍尔木兹管控待解，其余框架已定；第四轮今日周日续谈",d:"意大利《共和报》驻伊斯兰堡记者报道，截至当地时间凌晨1:57，美伊代表团仍同处一室谈判近10小时。据称，区域安全、人道主义重建（含所有方面）及解冻资产三大框架已基本确定，霍尔木兹海峡管控问题是最后核心障碍，或需其他地区及全球参与方发挥决定性作用。伊朗国家电视台驻伊斯兰堡记者确认：第四轮会谈将于周日（今日）继续。美伊第三轮谈判结束时，双方在霍尔木兹管控、海外资产解冻、铀浓缩三大核心议题上分歧依然尖锐。"},
    {cat:"全球事件",p:"HIGH",t:"特朗普深夜连发声明：\"伊朗军队、海军、空军已被彻底摧毁，28艘布雷舰全部沉海\"；称霍尔木兹\"很快开放\"",d:"北京时间4月11日深夜至次日凌晨，特朗普在社媒接连发帖：宣称\"美国已彻底摧毁伊朗的军队，包括整个海军和空军\"，称伊朗28艘布雷舰\"现已全部躺在海底\"，并表示美军已开始扫雷，将协助日本、韩国、法国、德国等盟国恢复通行。同时批评\"假新闻媒体要么疯了要么彻底腐败\"。伊朗外交部发言人确认代表团已开始信息交流，强调谈判成败取决于美方是否提出\"无理要求\"。"},
    {cat:"全球事件",p:"HIGH",t:"伊朗警告美军驱逐舰：若继续逼近霍尔木兹将在30分钟内遭打击；美舰随后撤退",d:"据报道，伊朗武装力量监测到一艘美国驱逐舰从阿联酋富查伊拉港出发向霍尔木兹方向行进，伊朗随即通过巴基斯坦调停方向美方传递明确警告：\"若驱逐舰继续靠近霍尔木兹海峡，将在30分钟内遭到打击，谈判将受到影响。\"美方随后下令驱逐舰停止前进并后撤。此事件发生于伊斯兰堡谈判进行期间，显示双方军事对峙与外交谈判同步并行，谈判脆弱性极高，任何军事误判均可能导致对话中断。"},
    {cat:"全球事件",p:"MID",t:"以色列24小时内对黎巴嫩发动200次打击；美方否认已同意解冻伊朗资产",d:"以色列国防军声明，过去24小时内对黎巴嫩约200个目标实施空袭，均称与真主党相关，地面行动在黎南部持续推进。与此同时，白宫官员明确否认美国已同意解冻伊朗资产，此前有媒体报道称美方在谈判中做出相关让步，但白宫声明\"美国官员否认此事\"。两件事叠加说明：谈判桌上的博弈与战场上的交火仍在同步进行，对话窗口面临多重压力。"},
    {cat:"加密数据",p:"MID",t:"恐慌与贪婪指数升至16（深度恐慌区间），较前日略回升；分析师：若历史重演BTC或再有一波下探",d:"加密恐慌与贪婪指数今日读数升至16（前日15），仍处于\"深度恐慌\"区间。分析师Killa指出，\"每个周期均包含一次以投降式底部结束的最终下跌\"，当前周期的顶部较以往周期出现更早，\"若历史重演，BTC或在确立真正底部前还有一波下跌\"。当前指数数值历史上往往预示大规模抛售已基本完成，但分析师建议结合多维指标综合判断，不应单独作为入场信号。BTC在谈判消息刺激下短暂触及$73,790触发部分止损，目前区间震荡。"},
    {cat:"加密数据",p:"MID",t:"SpaceX持有8,285枚BTC（约$6亿），2025年亏损近$50亿后仍未减持——视BTC为长期战略资产",d:"据报道，SpaceX在Coinbase Prime托管账户中持有8,285枚BTC，按当前价格约合$6.03亿。尽管公司2025年因整合马斯克旗下xAI子公司录得接近$50亿亏损，SpaceX自2024年中以来未进行任何减持操作，最近一次调仓也仅为内部再平衡。分析认为，SpaceX将BTC定位为\"长期战略资产而非短期流动性缓冲\"；随着IPO临近，新会计准则要求披露加密资产，BTC价格波动将成为其财报中的重要可变量，或进一步推动企业资产负债表持有BTC的讨论。"},
    {cat:"链上事件",p:"MID",t:"合约巨鲸\"先定10个大目标\"做空BTC止损位$73,500被触及，若执行将亏损约$499万",d:"合约交易员\"先定10个大目标\"（@Jason60704294）此前公开喊单做空BTC，持仓2,567.49枚BTC空头（约$1.84亿名义价值），止损设在$73,500。4月12日早间BTC短暂触及$73,790，超过其公开的止损位，若严格执行纪律平仓，理论亏损约$499.4万。该交易员同时持有38,465枚ETH空头头寸止损待更新。此事件与4月10日同一地址BTC空头$4,333万爆仓案例相呼应，再次警示高杠杆反趋势操作的极高风险。"},
    {cat:"链上事件",p:"MID",t:"链上最大HYPE多单4个月累计扣付资金费$200万后，浮盈仍超$500万",d:"Lookonchain监测显示，一交易员4个月前以$38.68均价、5倍杠杆做多138万枚HYPE（仓位价值约$5,840万），为当前链上最大HYPE多单。尽管累计承担超过$200万资金费支出，该仓位目前浮盈仍超$500万。此案例展示了高置信度方向判断下，持仓穿越震荡与资金费消耗后依然能够实现正回报的案例；同时也揭示了高杠杆多单在资金费方面的隐性成本不可忽视。"}

  "2026-04-13": [
    {cat:"全球事件",p:"HIGH",t:"美伊伊斯兰堡谈判破裂：20小时无果，特朗普宣布封锁霍尔木兹并威胁恢复军事打击",d:"美伊代表团在伊斯兰堡进行逾20小时谈判后无果而终，双方代表团随后离场。伊朗外长阿拉格希表示伊方\"以真诚态度参与谈判\"，但批评美方\"在距离达成协议仅一步之遥时索求过多、不断改变条件、威胁封锁，毫无诚意\"，并称\"善意换善意，敌意换敌意\"。核问题（铀浓缩）是最终破裂的核心分歧，特朗普明确宣布这是其\"红线\"。伊朗方面表示已\"拒绝三项无理要求\"，但愿在美方回归国际法框架前提下达成\"均衡公平协议\"。分析认为伊朗将此次谈判定性为\"最后机会\"，破裂后双方重新进入强硬对抗模式。"},
    {cat:"全球事件",p:"HIGH",t:"美军今晚22:00起封锁伊朗港口出入交通；特朗普与美军中央司令部口径不一：总统说\"封锁全峡\"，军方仅限\"伊朗港口\"",d:"美国中央司令部正式通告：北京时间4月13日22:00起，对\"所有进出伊朗港口及沿海地区（含阿拉伯湾和阿曼湾所有伊朗港口）的海上交通\"实施管控，建议商业船员监听相关广播并保持16频道无线电联络；明确声明\"不阻碍在霍尔木兹海峡非伊朗港口间通行的船只之航行自由\"。然而特朗普此前在社媒宣称将\"封锁霍尔木兹海峡，拦截向伊朗缴纳通行费的船只\"，范围明显更广。两者口径不一被解读为政治强硬表态与军事操作现实之间的落差，将加大市场对局势判断的不确定性。英国同日明确宣布不参与封锁行动，支持航行自由。"},

    {cat:"链上事件",p:"MID",t:"两地址合计质押23,142枚ETH（约$5,074万）；其中一地址从Gemini提取5,142枚后直接质押",d:"Onchain Lens监测显示，昨夜两个地址合计质押23,142枚ETH：第一地址直接质押18,000枚ETH（约$3,945万）；第二地址先从Gemini交易所提取5,142枚ETH后随即质押（约$1,129万），合计约$5,074万（23,142 × ~$2,192 ≈ $5,073万）。在当前地缘风险上升背景下，机构地址选择将ETH从交易所转出并质押，而非抛售套现，被部分分析师解读为对ETH中长期价值的信心表态。"},

    {cat:"行业趋势",p:"MID",t:"Michael Saylor：Strategy比特币年收益率只需超2.05%，即可实现永续\"无限循环\"派息",d:"Michael Saylor公开表示，Strategy发行永续优先股（STRC，年化约11.5%）融资购入BTC的商业模式中，只要比特币年价格涨幅超过2.05%，公司即可在不增发MSTR普通股的前提下无限期支付优先股股息——BTC升值覆盖融资成本，形成自我循环。Saylor将此称为\"比特币无限循环\"。分析指出这一模型依赖BTC长期向上的单一假设，若BTC价格长期横盘或下跌，优先股持有人和普通股股东均面临系统性风险；在当前地缘风险升温、BTC跌破$71,000的背景下，该模型的可持续性正受到更多审视。"},
    {cat:"行业趋势",p:"MID",t:"FBI：2025年加密欺诈损失$113.66亿创历史新高，同比+22%；AI相关欺诈$8.93亿，老年群体损失近40%",d:"FBI发布2025年互联网犯罪报告：加密货币相关欺诈损失达$113.66亿，同比增长22%，创历史最高水平，共收到181,565件相关投诉。分类数据：加密投资欺诈$72亿（最大单类）；ATM及自助机诈骗$3.89亿（同比+58%）；AI辅助欺诈损失$8.93亿，其中$6.587亿涉及加密货币，增速最快。60岁以上老年群体损失$44亿，占总损失近40%。加州以$20.99亿居各州之首。报告强调AI工具正在大幅降低诈骗门槛，使普通人更难识别虚假场景和虚假身份。"},
    {cat:"行业趋势",p:"MID",t:"本周大额代币解锁预警：ARB（4/16，$1,043万，占流通1.75%）、DBR（4/17，$910万，占流通12.9%）、YZY（4/18，$637万）",d:"本周将有三个项目迎来大额代币解锁：ARB将于4月16日解锁9,265万枚（约$1,043万，占流通量1.75%），影响相对可控；DBR将于4月17日解锁6.183亿枚（约$910万），但占流通量比例高达12.9%，潜在抛压风险显著；YZY将于4月18日解锁2,083万枚（约$637万，占流通4.67%）。分析提示，在当前市场整体风险偏好下降背景下，高比例解锁代币（尤其是DBR）面临更大的下行压力，建议提前关注相关项目的持仓变化。"}

  "2026-04-14": [
    {cat:"全球事件",p:"HIGH",t:"霍尔木兹封锁正式落地：美军15艘军舰已就位，P-8+E-2+无人机蜂群海空联合立体封锁；伊朗宣布最高战斗警戒",d:"北京时间4月13日22:00，美军对伊朗港口封锁令正式生效。据华尔街日报，美国中央司令部已派遣逾15艘军舰抵位支援，同时部署P-8猎户座海上巡逻机（具备反潜与反舰能力）、E-2鹰眼预警机及大规模无人机蜂群，构成海空联合立体封锁体系。目标为阻止伊朗港口的船只经由霍尔木兹进入阿曼湾和阿拉伯海。伊朗随即宣布武装力量进入\"最高战斗警戒\"，准将Majid Ibn Reza表示\"军队已全面动员，导弹与无人机库存充裕，可支撑持续作战，对任何侵略将给予严厉决定性回击\"。沙特阿拉伯随后紧急敦促美国取消封锁，称此举威胁地区稳定。"},
    {cat:"全球事件",p:"HIGH",t:"核谈判分歧曝光：美要求暂停20年并移走浓缩铀，伊朗最多接受5年且拒绝出境；万斯：伊方代表团无最终授权",d:"Axios援引知情人士称，美国要求伊朗接受铀浓缩活动暂停20年，并将已有高浓缩铀移出国境；伊朗提出的方案为暂停最多5年，且高浓缩铀可留在国内经大幅稀释后保存——两者差距悬殊。美国副总统万斯在Fox News接受采访时透露谈判僵局根源：\"伊朗谈判团队无法自主拍板，必须返回德黑兰经最高领袖等人批准才能接受美方提案\"，结构性授权不足导致谈判效率极低。《纽约时报》同时披露，伊朗官员内部正研究将\"放弃铀浓缩\"作为战争结束的谈判条件，显示强硬立场或存松动空间，特朗普表示在局势升级前愿尝试新一轮谈判。"},
    {cat:"全球事件",p:"HIGH",t:"战前最后一批霍尔木兹油轮本周到港：中东输亚原油降至正常水平的30%；菲律宾宣布国家能源紧急状态",d:"航运分析数据显示，战前（2月28日前）最后一批离开霍尔木兹海峡的油轮本周陆续抵达全球各地炼油厂。目前中东输往亚洲的原油日供应量已从正常水平的1,340万桶骤降至约400万桶（降幅约70%）；Forties原油物理现货价格逼近$149/桶，创2008年以来最高水平。菲律宾宣布国家能源紧急状态，汽油价格已翻倍；印度尼西亚和越南下令远程办公；澳大利亚紧急动用燃料储备。联合国警告，能源与食品价格冲击叠加可能导致3,250万人陷入贫困。分析指出，若封锁持续三个月，欧美炼油厂将被迫减产，届时航空燃油、柴油和液化天然气将面临严重短缺。"},
    {cat:"全球事件",p:"MID",t:"BTC昨夜反弹+4.54%突破$74,000，ETH+4.72%破$2,300；日韩股市今早高开，KOSPI涨约+2.4%",d:"受核谈判或存松动空间（NYT报道）以及特朗普表示愿再谈判等信号提振，BTC于北京时间13日22:00前后率先反弹，短时突破$74,000，24小时涨幅4.54%；ETH突破$2,300，24小时涨幅4.72%，两者均收复前日因谈判破裂引发的跌幅。日韩股市4月14日早盘高开，韩国KOSPI涨约2.4%，延续亚太市场风险偏好的阶段性修复。Circle（CRCL）在市场整体动荡中昨夜逆势上涨近7%至$93.96，被解读为稳定币基础设施在高波动环境下的防御性配置。"},
    {cat:"全球监管",p:"HIGH",t:"白宫顾问：《清晰法案》多项分歧逐步化解，稳定币收益妥协方案有望维持；参议院委员会审查在即",d:"白宫总统数字资产顾问委员会执行董事Patrick Witt表示，美国《数字资产市场结构清晰法案》（CLARITY Act）参议院谈判中的多项核心分歧正逐步化解；此前最大障碍之一的\"稳定币是否可以提供收益\"已达成妥协——允许质押收益及支付奖励形式，但禁止类银行存款利息，Witt表示\"希望该妥协方案能经久耐用\"。剩余未解问题包括：DeFi反洗钱条款，以及民主党要求禁止政府官员从加密资产中获利（矛头指向特朗普家族）。Witt表示委员会已\"非常接近全面解决\"，并对参议院银行委员会审查前完成协议持乐观态度。此法案若通过，将为美国加密行业提供明确监管框架。"},
    {cat:"链上事件",p:"HIGH",t:"贝莱德7小时内从Coinbase提取2,004枚BTC（约$1.45亿）；机构悄然增持信号",d:"Onchain Lens监测显示，贝莱德（BlackRock）在约7小时内分批从Coinbase提取2,004枚BTC，总价值约$1.4482亿（2,004 × ~$72,260 ≈ $1.448亿）。大型机构从交易所提取BTC通常被解读为转入自托管或冷存储，意味着不倾向短期出售，具有一定看多含义。这一动作发生在BTC因霍尔木兹封锁利空急跌后的昨夜反弹窗口，与BTC重回$74,000时间节点高度吻合，市场将其解读为贝莱德借助价格回调低位吸纳的操作。"},
    {cat:"链上事件",p:"MID",t:"\"先定10个大目标\"BTC空头止损落地，确认亏损约$500万；高杠杆反趋势系列案例收官",d:"合约交易员\"先定10个大目标\"（@Jason60704294）在BTC突破$73,500止损位后，正式执行平仓，确认亏损约$500万美元（持仓2,567.49枚BTC空头）。该交易员此前三次以40倍杠杆开立BTC空头均以清算或止损收场，系列案例跨越约一周，前后共计损失超$500万（含4月10日爆仓$4,333万中所属份额）。当前BTC反弹至$74,000+，其余38,465枚ETH空头止损情况仍待披露。这一系列案例成为本周链上观察高杠杆反趋势交易系统性失败的典型样本。"},
    {cat:"链上事件",p:"MID",t:"Bitmine持有487.4万枚ETH（占供应量4.04%），质押年化收入$2.12亿；目标持仓5%时年化将达$3.10亿",d:"以太坊机构持仓平台Bitmine披露最新数据：当前累计持有487.4万枚ETH（占ETH总供应量1.207亿枚的4.04%），已完成5%持仓目标的80%。其中333.46万枚ETH已通过MAVAN平台及质押合作方完成质押（约占持仓68%），按当前年化收益率约2.9%计算，年化质押收入约$2.12亿；若全部487.4万枚完成质押，年化收入将达$3.10亿。在地缘局势高度不确定的当前环境下，Bitmine的大规模ETH累积策略体现了其对以太坊质押经济长期价值的强烈信心。"}

  {date:"2026-04-15",btc:">$76,000",btcChg:"+6.05% 24h",eth:"~$2,300+",headline:"特朗普Fox News宣布\"伊朗战争已经结束\"·原油跌4%·BTC+6%破$76,000·加密股HOOD+10%"},
  {date:"2026-04-16",btc:"$75,008",btcChg:"+1.27%",eth:"~$2,200",headline:"美伊讨论停火延长两周·伊朗否认·ALTS指数+11.46%·BTC维守$75,000·XRP ETF净流入$1711万"}
];

const ALL_DATES = Object.keys(DAILY_SNAPSHOTS).sort();
const STATUS_COLORS = {
  "上架中": "#BCFF2F",
  "生效中": "#4CAF50",
  "迭代": "#FFD600",
  "已下架": "#FF3B3B",
  "废弃草稿": "#666"
};

// ─── COMPONENTS ──────────────────────────────────────────────────────────────

function Badge({ text, color }) {
  return (
    <span style={{
      display:"inline-block",background:color||"#333",color:color==="#FFD600"||color==="#BCFF2F"?"#000":"#fff",
      borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,marginRight:4
    }}>{text}</span>
  );
}

function PriorityBadge({ p }) {
  const c = p === "HIGH" ? "#FF3B3B" : p === "MID" ? "#FFD600" : "#666";
  const bg = p === "HIGH" ? "rgba(255,59,59,0.15)" : p === "MID" ? "rgba(255,214,0,0.1)" : "rgba(255,255,255,0.05)";
  return <span style={{background:bg,color:c,border:`1px solid ${c}33`,borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:700,marginRight:6}}>{p}</span>;
}

// ─── TAB 1: TOPIC LIST ───────────────────────────────────────────────────────
function TopicListTab() {
  const [filter, setFilter] = useState("全部");
  const statuses = ["全部","上架中","迭代","生效中","已下架"];

  const filtered = filter === "全部" ? TOPIC_MASTER : TOPIC_MASTER.filter(t => t.status === filter);

  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {statuses.map(s=>(
          <button key={s} onClick={()=>setFilter(s)} style={{
            background:filter===s?(STATUS_COLORS[s]||"#BCFF2F"):"#111",
            color:filter===s?"#000":"#aaa",
            border:`1px solid ${filter===s?"transparent":"#333"}`,
            borderRadius:16,padding:"4px 14px",fontSize:12,fontWeight:600,cursor:"pointer"
          }}>{s} {s !== "全部" && `(${TOPIC_MASTER.filter(t=>t.status===s).length})`}</button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {filtered.map(t=>(
          <div key={t.id} style={{background:"#111",borderRadius:8,padding:"10px 14px",border:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#555",width:35,textAlign:"right"}}>#{t.id}</span>
            <Badge text={t.status} color={STATUS_COLORS[t.status]}/>
            {t.iter && <span style={{fontSize:10,color:"#888",background:"#1a1a1a",borderRadius:4,padding:"1px 5px"}}>v{t.iter}</span>}
            <span style={{flex:1,fontSize:13,color:"#eee",minWidth:150}}>{t.zh}</span>
            {t.orig && <span style={{fontSize:10,color:"#444",width:"100%",paddingLeft:55}}>原始: {t.orig}</span>}
            <span style={{fontSize:11,color:"#555"}}>{t.create} → {t.remove || "至今"}</span>
            <span style={{fontSize:11,color:"#BCFF2F",fontWeight:700,width:35,textAlign:"right"}}>{TOPIC_FREQUENCY[t.id]||0}天</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── TAB 3: DAILY BOARD ──────────────────────────────────────────────────────
function DailyBoardTab() {
  const [selectedDate, setSelectedDate] = useState(ALL_DATES[ALL_DATES.length-1]);
  const topics = DAILY_SNAPSHOTS[selectedDate] || [];
  const onBoard = topics.filter(t=>t.s==="上榜");
  const offBoard = topics.filter(t=>t.s!=="上榜");

  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:8}}>
        {ALL_DATES.map(d=>(
          <button key={d} onClick={()=>setSelectedDate(d)} style={{
            flexShrink:0,background:selectedDate===d?"#BCFF2F":"#111",
            color:selectedDate===d?"#000":"#888",
            border:"1px solid",borderColor:selectedDate===d?"#BCFF2F":"#222",
            borderRadius:12,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:selectedDate===d?700:400
          }}>{d.slice(5)}</button>
        ))}
      </div>

      <div style={{fontSize:12,color:"#666",marginBottom:12}}>
        {selectedDate} · 上榜 {onBoard.length} 个话题 {offBoard.length > 0 && `· 未上架 ${offBoard.length}`}
      </div>

      {onBoard.map((t,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #111"}}>
          <span style={{width:24,height:24,borderRadius:12,background:"#BCFF2F",color:"#000",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>{i+1}</span>
          <span style={{fontSize:12,color:"#555",width:30}}>#{t.id}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:"#eee",fontWeight:600}}>{t.zh}</div>
            <div style={{fontSize:11,color:"#555"}}>{t.en}</div>
          </div>
          <span style={{fontSize:10,color:"#BCFF2F",fontWeight:600}}>{TOPIC_FREQUENCY[t.id]||0}天</span>
        </div>
      ))}

      {offBoard.length > 0 && (
        <>
          <div style={{fontSize:11,color:"#555",marginTop:16,marginBottom:8}}>未上架</div>
          {offBoard.map((t,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",opacity:0.5}}>
              <span style={{width:24}}/>
              <span style={{fontSize:12,color:"#555",width:30}}>#{t.id}</span>
              <span style={{fontSize:13,color:"#888"}}>{t.zh}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ─── TAB 4: HEATMAP ──────────────────────────────────────────────────────────
function HeatmapTab() {
  const topicIds = [...new Set(Object.values(DAILY_SNAPSHOTS).flat().filter(t=>t.s==="上榜").map(t=>t.id))];
  const sorted = topicIds.sort((a,b)=>(TOPIC_FREQUENCY[b]||0)-(TOPIC_FREQUENCY[a]||0));

  return (
    <div style={{overflowX:"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:`120px repeat(${ALL_DATES.length}, 1fr)`,gap:1,fontSize:10,minWidth:700}}>
        <div style={{background:"#0a0a0a",padding:4,color:"#555",fontWeight:700}}>话题 \ 日期</div>
        {ALL_DATES.map(d=><div key={d} style={{background:"#0a0a0a",padding:4,color:"#555",textAlign:"center",fontWeight:600}}>{d.slice(8)}</div>)}
        {sorted.map(id=>{
          const topic = TOPIC_MASTER.find(t=>t.id===id);
          const name = topic ? topic.zh : `#${id}`;
          return [
            <div key={`l-${id}`} style={{background:"#111",padding:"4px 6px",color:"#aaa",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={name}>#{id} {name.slice(0,8)}</div>,
            ...ALL_DATES.map(d=>{
              const present = (DAILY_SNAPSHOTS[d]||[]).some(t=>t.id===id&&t.s==="上榜");
              return <div key={`${id}-${d}`} style={{background:present?"#BCFF2F":"#0c0c0c",opacity:present?0.85:1,borderRadius:2}}/>;
            })
          ];
        })}
      </div>
      <div style={{display:"flex",gap:12,marginTop:12,fontSize:11,color:"#666"}}>
        <span><span style={{display:"inline-block",width:12,height:12,background:"#BCFF2F",borderRadius:2,verticalAlign:"middle",marginRight:4}}/>上榜</span>
        <span><span style={{display:"inline-block",width:12,height:12,background:"#0c0c0c",border:"1px solid #222",borderRadius:2,verticalAlign:"middle",marginRight:4}}/>未上榜</span>
      </div>
    </div>
  );
}

// ─── TAB 5: MARKET INSIGHTS ──────────────────────────────────────────────────
function MarketInsightsTab() {
  const allDates = Object.keys(ALL_NEWS).sort().reverse();
  const [activeDay, setActiveDay] = useState(allDates[0]);

  const news = ALL_NEWS[activeDay] || [];
  const marketRow = MARKET_DATA.find(m => m.date === activeDay);
  const cats = [...new Set(news.map(n=>n.cat))];
  const catIcons = {"全球事件":"🌍","宏观数据":"📊","全球监管":"⚖️","链上事件":"⛓️","加密数据":"📈","行业趋势":"🚀","传统金融":"🏦"};

  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {allDates.map(d=>(
          <button key={d} onClick={()=>setActiveDay(d)} style={{
            background:activeDay===d?"#BCFF2F":"#111",color:activeDay===d?"#000":"#aaa",
            border:"1px solid",borderColor:activeDay===d?"#BCFF2F":"#333",borderRadius:16,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0
          }}>{d.slice(5)}</button>
        ))}
      </div>

      {marketRow && (
        <div style={{background:"#0d1a09",border:"1px solid #1a2a14",borderLeft:"3px solid #BCFF2F",borderRadius:8,padding:14,marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:700,color:"#BCFF2F",letterSpacing:1,marginBottom:4}}>{activeDay}</div>
          <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:6,lineHeight:1.4}}>{marketRow.headline}</div>
          <div style={{fontSize:13,color:"#aaa"}}>
            BTC: <b style={{color:"#fff"}}>{marketRow.btc}</b>{" "}
            <span style={{color:marketRow.btcChg.startsWith("-")?"#FF3B3B":"#BCFF2F"}}>{marketRow.btcChg}</span>
            {" · "}ETH: <b style={{color:"#fff"}}>{marketRow.eth}</b>
          </div>
        </div>
      )}

      <div style={{fontSize:11,color:"#555",marginBottom:12}}>共 {news.length} 条资讯 · HIGH {news.filter(n=>n.p==="HIGH").length} · MID {news.filter(n=>n.p==="MID").length}</div>

      {cats.map(cat=>(
        <div key={cat} style={{marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",borderTop:"1px solid #111"}}>
            <span style={{fontSize:14}}>{catIcons[cat]||"📌"}</span>
            <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{cat}</span>
            <span style={{background:"#BCFF2F",color:"#000",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>{news.filter(n=>n.cat===cat).length}</span>
          </div>
          {news.filter(n=>n.cat===cat).map((n,i)=>(
            <div key={i} style={{padding:"8px 0",borderBottom:"1px solid #0f0f0f"}}>
              <div style={{marginBottom:4}}>
                <PriorityBadge p={n.p}/>
              </div>
              <div style={{fontSize:13,fontWeight:600,color:"#f0f0f0",lineHeight:1.4,marginBottom:3}}>{n.t}</div>
              <div style={{fontSize:12,color:"#777",lineHeight:1.5}}>{n.d}</div>
            </div>
          ))}
        </div>
      ))}

      <h3 style={{fontSize:14,color:"#fff",margin:"20px 0 12px"}}>17天市场走势一览</h3>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead>
            <tr style={{borderBottom:"1px solid #222"}}>
              {["日期","BTC","涨跌","ETH","市场主题"].map(h=><th key={h} style={{padding:"6px 8px",color:"#666",fontWeight:600,textAlign:"left"}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {MARKET_DATA.map((d,i)=>(
              <tr key={i} onClick={()=>setActiveDay(d.date)} style={{borderBottom:"1px solid #111",background:d.date===activeDay?"#0d1a09":"transparent",cursor:"pointer"}}>
                <td style={{padding:"5px 8px",color:d.date===activeDay?"#BCFF2F":"#aaa",fontWeight:d.date===activeDay?700:400}}>{d.date.slice(5)}</td>
                <td style={{padding:"5px 8px",color:"#fff",fontWeight:600}}>{d.btc}</td>
                <td style={{padding:"5px 8px",color:d.btcChg.startsWith("-")?"#FF3B3B":"#BCFF2F",fontWeight:600}}>{d.btcChg}</td>
                <td style={{padding:"5px 8px",color:"#ddd"}}>{d.eth}</td>
                <td style={{padding:"5px 8px",color:"#888",maxWidth:300}}>{d.headline}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── MAIN DASHBOARD ──────────────────────────────────────────────────────────
const TABS = [
  {key:"heatmap",label:"热力图",icon:"🔥"},
  {key:"topics",label:"话题清单",icon:"📋"},
  {key:"daily",label:"每日榜单",icon:"📅"},
  {key:"market",label:"市场洞察",icon:"💹"}
];

function OKXDashboard() {
  const [tab, setTab] = useState("heatmap");

  return (
    <div style={{background:"#000",color:"#fff",fontFamily:"-apple-system,'PingFang SC','SF Pro Text','Helvetica Neue',Arial,sans-serif",minHeight:"100vh",maxWidth:960,margin:"0 auto"}}>
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(0,0,0,0.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid #1a1a1a",padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <span style={{fontSize:18,fontWeight:800}}>OKX 话题运营</span>
            <span style={{color:"#BCFF2F",fontSize:18,fontWeight:800}}>看板</span>
          </div>
          <span style={{fontSize:11,color:"#555",background:"#111",border:"1px solid #222",borderRadius:20,padding:"3px 10px"}}>
            {ALL_DATES[0]} → {ALL_DATES[ALL_DATES.length-1]} · v4
          </span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {TABS.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} style={{
              background:tab===t.key?"#BCFF2F":"#111",color:tab===t.key?"#000":"#888",
              border:`1px solid ${tab===t.key?"#BCFF2F":"#222"}`,borderRadius:16,
              padding:"5px 14px",fontSize:12,fontWeight:tab===t.key?700:400,cursor:"pointer",
              display:"flex",alignItems:"center",gap:4
            }}>{t.icon} {t.label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:16}}>
        {tab === "topics" && <TopicListTab />}
        {tab === "daily" && <DailyBoardTab />}
        {tab === "heatmap" && <HeatmapTab />}
        {tab === "market" && <MarketInsightsTab />}
      </div>

      <div style={{padding:"12px 16px 20px",textAlign:"center",fontSize:10,color:"#333",borderTop:"1px solid #111"}}>
        OKX Orbit · 话题运营看板 v4.2 · Bitable数据截止4/16 · 市场资讯3/31-4/16共237条 · {new Date().toLocaleDateString('zh-CN')} 核对
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<OKXDashboard />);
</script>
</body>
